<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PearlAlgo Terminal</title>
    
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <div id="app">
        <!-- Header Bar -->
        <header class="header">
            <div class="header-left">
                <span class="symbol" id="symbol">MNQ</span>
                <span class="price" id="price">--</span>
                <span class="price-change" id="price-change"></span>
            </div>
            <div class="header-right">
                <span class="data-badge" id="data-badge">--</span>
                <span class="gate-badge" id="gate-badge">--</span>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="tabs">
            <button class="tab active" data-view="decision-room">Decision Room</button>
            <button class="tab" data-view="signals">Signals</button>
            <button class="tab" data-view="performance">Performance</button>
        </nav>

        <!-- Main Content Area -->
        <main class="content">
            <!-- Decision Room View -->
            <div id="view-decision-room" class="view active">
                <!-- Signal Selector -->
                <div class="signal-selector">
                    <select id="signal-select">
                        <option value="">Select a signal...</option>
                    </select>
                </div>

                <!-- Chart Container -->
                <div class="chart-container">
                    <div id="chart"></div>
                    <div class="chart-legend">
                        <span class="legend-item entry">● Entry</span>
                        <span class="legend-item stop">● Stop</span>
                        <span class="legend-item target">● Target</span>
                    </div>
                </div>

                <!-- Explainability Panels -->
                <div class="panels">
                    <!-- Setup Summary -->
                    <div class="panel" id="panel-setup">
                        <div class="panel-header" onclick="togglePanel('setup')">
                            <span>📋 Setup Summary</span>
                            <span class="panel-toggle">▼</span>
                        </div>
                        <div class="panel-content">
                            <div id="setup-content">Select a signal to view details</div>
                        </div>
                    </div>

                    <!-- Evidence -->
                    <div class="panel" id="panel-evidence">
                        <div class="panel-header" onclick="togglePanel('evidence')">
                            <span>🔍 Evidence</span>
                            <span class="panel-toggle">▼</span>
                        </div>
                        <div class="panel-content">
                            <div id="evidence-content">--</div>
                        </div>
                    </div>

                    <!-- Risks -->
                    <div class="panel" id="panel-risks">
                        <div class="panel-header" onclick="togglePanel('risks')">
                            <span>⚠️ Risks / Invalidation</span>
                            <span class="panel-toggle">▼</span>
                        </div>
                        <div class="panel-content">
                            <div id="risks-content">--</div>
                        </div>
                    </div>

                    <!-- ATS Constraints -->
                    <div class="panel" id="panel-ats">
                        <div class="panel-header" onclick="togglePanel('ats')">
                            <span>🤖 ATS Constraints</span>
                            <span class="panel-toggle">▼</span>
                        </div>
                        <div class="panel-content">
                            <div id="ats-content">--</div>
                        </div>
                    </div>

                    <!-- ML View -->
                    <div class="panel" id="panel-ml">
                        <div class="panel-header" onclick="togglePanel('ml')">
                            <span>🧠 ML Analysis</span>
                            <span class="panel-toggle">▼</span>
                        </div>
                        <div class="panel-content">
                            <div id="ml-content">--</div>
                        </div>
                    </div>

                    <!-- Notes -->
                    <div class="panel" id="panel-notes">
                        <div class="panel-header" onclick="togglePanel('notes')">
                            <span>📝 Notes</span>
                            <span class="panel-toggle">▼</span>
                        </div>
                        <div class="panel-content">
                            <div id="notes-list"></div>
                            <div class="note-input">
                                <textarea id="note-text" placeholder="Add a note..."></textarea>
                                <button id="save-note" onclick="saveNote()">Save</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Signals List View -->
            <div id="view-signals" class="view">
                <div class="signals-list" id="signals-list">
                    <div class="loading">Loading signals...</div>
                </div>
            </div>

            <!-- Performance View -->
            <div id="view-performance" class="view">
                <div class="performance-grid" id="performance-grid">
                    <div class="loading">Loading performance...</div>
                </div>
            </div>
        </main>

        <!-- Status Bar -->
        <footer class="status-bar">
            <span id="agent-status">--</span>
            <span id="last-update">--</span>
        </footer>
    </div>

    <!-- App JavaScript -->
    <script src="/static/app.js"></script>
</body>
</html>
