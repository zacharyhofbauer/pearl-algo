# Pearl AI Narration Prompts - Versioned Templates
# Last reviewed: 2026-02-06
#
# These are the narration prompt templates used by PearlNarrator.
# Each template expects context variables to be injected via .format() or f-string.

trade_entered:
  version: "1.0.0"
  last_reviewed: "2026-02-06"
  description: "Narration prompt for trade entry events"
  template: |
    Narrate this trade entry in EXACTLY 1 sentence (max 25 words):
    {direction} at {entry_price}, {regime} market, {pressure}, ML {ml_pct}%.

    Output format: "Entered [DIRECTION] at [PRICE] — [one key observation]."
    Example: "Entered LONG at 25530 — trending market with 72% ML confidence."
    DO NOT exceed 1 sentence.

trade_exited:
  version: "1.0.0"
  last_reviewed: "2026-02-06"
  description: "Narration prompt for trade exit events"
  template: |
    Narrate this trade exit in EXACTLY 1 sentence (max 25 words):
    {direction} closed: ${pnl} ({reason}). Daily P&L: ${daily_pnl}.
    {streak_note}

    Output format: "Closed [DIRECTION]: $[P&L] ([reason]) — [brief context]."
    Example: "Closed LONG: +$45.50 (take profit) — day now at +$150."
    DO NOT exceed 1 sentence. Must mention the P&L amount.

signal_generated:
  version: "1.0.0"
  last_reviewed: "2026-02-06"
  description: "Narration prompt for signal generation events"
  template: |
    Briefly note this signal generation (1 sentence):
    - Signal Type: {signal_type}
    - ML Probability: {ml_pct}%
    - Market: {regime} with {pressure}
    - Session: {session}

    One sentence noting the signal and its context.
    Example: "Spotted a LONG signal with 68% ML confidence - buyer pressure building in this ranging market."
    Keep it brief.

signal_rejected:
  version: "1.0.0"
  last_reviewed: "2026-02-06"
  description: "Narration prompt for signal rejection events"
  template: |
    Explain this signal rejection in EXACTLY 1 sentence (max 20 words):
    Reason: {reason}. Rejections today: {total}.

    Output: "Skipped [signal] — [specific reason]."
    Example: "Skipped LONG signal — ML confidence 28%, below threshold."
    DO NOT exceed 1 sentence.

circuit_breaker_triggered:
  version: "1.0.0"
  last_reviewed: "2026-02-06"
  description: "Narration prompt for circuit breaker activation"
  template: |
    Circuit breaker alert in EXACTLY 1 sentence (max 20 words):
    Reason: {reason}. Cooldown: {cooldown_minutes} minutes.

    Output: "Circuit breaker triggered — [reason]. Pausing [X] minutes."
    Example: "Circuit breaker triggered — daily loss limit. Pausing 30 minutes."
    DO NOT exceed 1 sentence.

direction_blocked:
  version: "1.0.0"
  last_reviewed: "2026-02-06"
  description: "Narration prompt for direction restriction events"
  template: |
    Note direction restriction:
    - Blocked Direction: {blocked}
    - Market Regime: {regime}

    One sentence about why this direction is restricted.

regime_changed:
  version: "1.0.0"
  last_reviewed: "2026-02-06"
  description: "Narration prompt for market regime change events"
  template: |
    Note market regime change:
    - Previous: {old_regime}
    - Current: {new_regime}
    - Confidence: {confidence_pct}%

    One sentence about what this means for trading.
