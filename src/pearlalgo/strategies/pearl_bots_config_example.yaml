# PEARL Automated Trading Bots Configuration (formerly Lux Algo bots)
#
# This configuration enables PEARL automated trading bots
# in your PEARLalgo NQ trading system. Each bot is a complete, self-contained
# trading strategy with indicators, logic, risk management, and automation.
#
# Similar to Lux Algo's AI Strategy Alerts, these bots can be deployed as
# zero-code automated strategies with webhook alerts and performance tracking.

pearl_bots:
  enabled: true  # Set to true to enable PEARL bots

  # Bot configurations - each bot is a complete automated strategy
  bots:

    # Trend Follower Bot - Similar to Lux Algo's Signals & Overlays (S&O)
    # Identifies strong trends and enters on pullbacks within trending markets
    trend_follower:
      enabled: true
      description: "Trend-following bot using moving averages and momentum"
      bot_class: "TrendFollowerBot"  # Must match registered bot class name

      # Trading parameters
      symbol: "MNQ"
      timeframe: "5m"
      max_positions: 1

      # Risk management (Prop Firm style)
      risk_per_trade: 0.01      # 1% of capital per trade
      stop_loss_pct: 0.005      # 0.5% stop loss
      take_profit_pct: 0.01     # 1% take profit
      min_confidence: 0.7       # Minimum signal confidence

      # Alert and automation settings
      enable_alerts: true
      webhook_url: "https://your-webhook-endpoint.com/signal"  # Optional webhook for automation

      # Bot-specific parameters (trend following logic)
      parameters:
        min_trend_strength: 25.0      # Minimum ADX-like trend strength
        max_pullback_pct: 0.02        # Maximum pullback percentage in trend
        momentum_threshold: 0.005     # Minimum momentum for trend confirmation

    # Breakout Bot - Similar to Lux Algo's Price Action Concepts (PAC)
    # Identifies consolidation patterns and trades breakouts with volume confirmation
    breakout_trader:
      enabled: true
      description: "Breakout bot trading consolidation breakouts"
      bot_class: "BreakoutBot"

      # Trading parameters
      symbol: "MNQ"
      timeframe: "5m"
      max_positions: 1

      # Risk management
      risk_per_trade: 0.01
      stop_loss_pct: 0.008      # Wider stops for breakouts
      take_profit_pct: 0.015    # Higher targets for breakouts
      min_confidence: 0.75

      # Alert settings
      enable_alerts: true
      webhook_url: null  # Set your webhook URL for automated execution

      # Bot-specific parameters (breakout logic)
      parameters:
        min_pattern_strength: 0.6          # Minimum consolidation pattern strength
        require_volume_confirmation: true  # Require volume spike on breakout
        min_momentum_acceleration: 0.001   # Minimum momentum acceleration

    # Composite Bot - All-in-one multi-scenario engine (trend/breakout/reversal/BOS)
    # Runs multiple indicator modules and uses multi-timeframe context (5m/15m + resampled HTF).
    composite_mnq:
      enabled: false
      description: "Composite multi-scenario bot with multi-timeframe context"
      bot_class: "CompositeBot"

      symbol: "MNQ"
      timeframe: "1m"
      max_positions: 1

      risk_per_trade: 0.01
      stop_loss_pct: 0.006
      take_profit_pct: 0.012
      min_confidence: 0.70

      enable_alerts: true
      webhook_url: null

      parameters:
        timeframes: ["1m", "5m", "15m", "1h", "4h"]
        max_candidates: 1
        require_mtf_alignment: true
        indicators:
          enabled:
            - power_channel
            - tbt_chartprime
            - supply_demand_zones
            - smart_money_divergence

    # Mean Reversion Bot - Similar to Lux Algo's Oscillator Matrix (OSC)
    # Identifies overbought/oversold conditions and trades reversions
    # NOTE: Higher risk strategy - enable only if you understand mean reversion
    mean_reverter:
      enabled: false  # Disabled by default - higher risk
      description: "Mean reversion bot using oscillator analysis"
      bot_class: "MeanReversionBot"

      # Trading parameters
      symbol: "MNQ"
      timeframe: "5m"
      max_positions: 1

      # Risk management (tighter for mean reversion)
      risk_per_trade: 0.008     # Lower risk per trade
      stop_loss_pct: 0.003      # Tighter stops
      take_profit_pct: 0.008    # Lower targets
      min_confidence: 0.8       # Higher confidence required

      # Alert settings
      enable_alerts: true
      webhook_url: null

      # Bot-specific parameters (mean reversion logic)
      parameters:
        min_mr_strength: 0.7      # Minimum mean reversion strength
        require_divergence: false # Require divergence for entry (optional)
        max_hold_bars: 10         # Maximum bars to hold position

# Integration settings
lux_algo_integration:
  # How to combine Lux Algo bots with existing PEARLalgo strategy
  signal_combination: "parallel"  # "parallel", "lux_algo_only", "hybrid"

  # Parallel: Run both Lux Algo bots and existing strategy
  # lux_algo_only: Use only Lux Algo bots
  # hybrid: Use Lux Algo bots but fall back to existing strategy if no signals

  # Performance tracking
  track_performance: true
  performance_report_interval: "daily"  # "hourly", "daily", "weekly"

  # Risk management across all bots
  global_risk_limits:
    max_total_positions: 3       # Maximum total positions across all bots
    max_risk_per_bot: 0.05      # Maximum risk allocation per bot (5%)
    max_total_risk: 0.15        # Maximum total risk across all bots (15%)

  # Market condition filters
  market_filters:
    enable_regime_filtering: true  # Enable/disable market regime filtering
    allowed_regimes: ["trending", "ranging", "volatile"]  # Market regimes to trade
    avoid_news_events: true        # Avoid trading during news events

# Webhook and automation settings
automation:
  enable_webhooks: true
  webhook_timeout: 5000  # milliseconds

  # Broker integration (for automated execution)
  broker_integration:
    enabled: false  # Set to true to enable automated execution
    broker_type: "ibkr"  # "ibkr", "alpaca", "interactive_brokers"
    api_key: "your_api_key_here"
    api_secret: "your_api_secret_here"

  # Alert destinations
  alerts:
    telegram: true
    email: false
    webhook: true
    log_file: true

# Backtesting and optimization
backtesting:
  enable_backtesting: true
  default_date_range: "3mo"  # "1mo", "3mo", "6mo", "1y", "2y"

  # Walk-forward optimization
  optimization:
    enabled: false
    optimization_window: "1mo"
    validation_window: "1wk"
    reoptimize_interval: "weekly"

# Monitoring and logging
monitoring:
  enable_detailed_logging: true
  log_level: "INFO"  # "DEBUG", "INFO", "WARNING", "ERROR"

  # Performance alerts
  performance_alerts:
    daily_pnl_threshold: -0.02    # Alert if daily P&L worse than -2%
    drawdown_threshold: 0.05      # Alert if drawdown exceeds 5%
    win_rate_threshold: 0.45      # Alert if win rate below 45%

  # Health checks
  health_checks:
    max_signal_age: 3600          # Alert if no signals for 1 hour
    max_error_rate: 0.1           # Alert if error rate exceeds 10%