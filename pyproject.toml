[project]
name = "pearlalgo-dev-ai-agents"
version = "0.2.2"
description = "Simple NQ futures trading agent with IBKR connection and Telegram notifications"
authors = [{ name = "PearlAlgo", email = "dev@pearlalgo.ai" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pandas>=2.2",
    "numpy>=2.0",
    "pydantic>=2.8",
    "pydantic-settings>=2.6",
    "python-dotenv>=1.0",
    "loguru>=0.7.0",
    "python-telegram-bot>=20.0",
    "PyYAML>=6.0",
    "pytz>=2024.1",
    "ib-insync>=0.9.86",
    "matplotlib>=3.8.0",
    "mplfinance>=0.12.10b0",
    "pyarrow>=16.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.21.0", "ruff>=0.6"]
lint = ["import-linter>=2.0"]
llm = ["openai>=1.40.0"]
monitor = ["PyQt6>=6.5"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

# ---------------------------------------------------------------------------
# import-linter: Module boundary enforcement (optional, requires `pip install -e .[lint]`)
# ---------------------------------------------------------------------------
# Mirrors the dependency matrix in docs/PROJECT_SUMMARY.md.
# Run: lint-imports
# ---------------------------------------------------------------------------

[tool.importlinter]
root_package = "pearlalgo"
include_external_packages = false

[[tool.importlinter.contracts]]
name = "utils is self-contained"
type = "forbidden"
source_modules = ["pearlalgo.utils"]
forbidden_modules = [
    "pearlalgo.config",
    "pearlalgo.data_providers",
    "pearlalgo.strategies",
    "pearlalgo.nq_agent",
]

[[tool.importlinter.contracts]]
name = "config does not depend on higher layers"
type = "forbidden"
source_modules = ["pearlalgo.config"]
forbidden_modules = [
    "pearlalgo.data_providers",
    "pearlalgo.strategies",
    "pearlalgo.nq_agent",
]

[[tool.importlinter.contracts]]
name = "data_providers does not depend on strategies or nq_agent"
type = "forbidden"
source_modules = ["pearlalgo.data_providers"]
forbidden_modules = [
    "pearlalgo.strategies",
    "pearlalgo.nq_agent",
]

[[tool.importlinter.contracts]]
name = "strategies does not depend on data_providers or nq_agent"
type = "forbidden"
source_modules = ["pearlalgo.strategies"]
forbidden_modules = [
    "pearlalgo.data_providers",
    "pearlalgo.nq_agent",
]

[[tool.importlinter.contracts]]
name = "execution does not depend on higher layers"
type = "forbidden"
source_modules = ["pearlalgo.execution"]
forbidden_modules = [
    "pearlalgo.data_providers",
    "pearlalgo.strategies",
    "pearlalgo.learning",
    "pearlalgo.nq_agent",
]

[[tool.importlinter.contracts]]
name = "learning does not depend on higher layers"
type = "forbidden"
source_modules = ["pearlalgo.learning"]
forbidden_modules = [
    "pearlalgo.data_providers",
    "pearlalgo.strategies",
    "pearlalgo.execution",
    "pearlalgo.nq_agent",
]
