[project]
name = "pearlalgo-dev-ai-agents"
version = "0.1.0"
description = "Futures- and commodities-first agent scaffold for research, backtesting, and live-trading extensions."
authors = [{ name = "PearlAlgo", email = "dev@pearlalgo.ai" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pandas>=2.2",
    "numpy>=2.0",
    "pydantic>=2.8",
    "pydantic-settings>=2.6",
    "pandas-ta>=0.4.70",
    "backtesting>=0.3.3",
    "python-dotenv>=1.0",
    "rich>=13.7",
    "ib-insync>=0.9.86",
    "scipy>=1.12",
]

[project.optional-dependencies]
backtrader = ["backtrader>=1.9.78.123"]
dev = ["pytest>=8.3", "ruff>=0.6"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
