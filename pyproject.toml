[project]
name = "pearlalgo-dev-ai-agents"
version = "0.1.0"
description = "Simple NQ futures trading agent with IBKR connection and Telegram notifications"
authors = [{ name = "PearlAlgo", email = "dev@pearlalgo.ai" }]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pandas>=2.2",
    "numpy>=2.0",
    "pydantic>=2.8",
    "pydantic-settings>=2.6",
    "pandas-ta>=0.4.70",
    "python-dotenv>=1.0",
    "loguru>=0.7.0",
    "python-telegram-bot>=20.0",
    "PyYAML>=6.0",
    "aiohttp>=3.9.0",
    "requests>=2.31.0",
    "pytz>=2024.1",
    "ib-insync>=0.9.86",
]

[project.optional-dependencies]
backtrader = ["backtrader>=1.9.78.123"]
dev = ["pytest>=8.3", "ruff>=0.6"]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
