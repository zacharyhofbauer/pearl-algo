services:
  # IB Gateway - Headless IBKR API gateway
  ib-gateway:
    image: unusualalpha/ib-gateway-docker:latest
    container_name: ib-gateway
    restart: unless-stopped
    environment:
      - IBKR_ACCOUNT_TYPE=${IBKR_ACCOUNT_TYPE:-paper}
      - IBKR_USERNAME=${IBKR_USERNAME:-}
      - IBKR_PASSWORD=${IBKR_PASSWORD:-}
      - IBKR_READ_ONLY_API=${IBKR_READ_ONLY_API:-true}
      - IBKR_SOCKET_PORT=${IBKR_SOCKET_PORT:-4002}
      - TZ=${TZ:-America/New_York}
    ports:
      - "${IBKR_SOCKET_PORT:-4002}:4002"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4002"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - ib-gateway-data:/root/Jts
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-trading-bot
    restart: unless-stopped
    depends_on:
      ib-gateway:
        condition: service_healthy
    environment:
      # IBKR configuration (connect to ib-gateway container)
      - IBKR_HOST=${IBKR_HOST:-ib-gateway}
      - IBKR_PORT=${IBKR_PORT:-4002}
      - IBKR_CLIENT_ID=${IBKR_CLIENT_ID:-1}
      - IBKR_DATA_CLIENT_ID=${IBKR_DATA_CLIENT_ID:-2}
      - IBKR_ACCOUNT_TYPE=${IBKR_ACCOUNT_TYPE:-paper}
      
      # LLM (optional)
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      
      # Alerts (optional)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      
      # Trading
      - PEARLALGO_PROFILE=${PEARLALGO_PROFILE:-paper}
      - LIVE_STARTING_BALANCE=${LIVE_STARTING_BALANCE:-50000.0}
      
      # Python
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      # Persist logs and data
      - ./logs:/app/logs
      - ./data:/app/data
      - ./signals:/app/signals
      - ./reports:/app/reports
      - ./state_cache:/app/state_cache
      - ./telemetry:/app/telemetry
      # Config
      - ./config:/app/config
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  trading-network:
    driver: bridge

volumes:
  ib-gateway-data:
    driver: local
