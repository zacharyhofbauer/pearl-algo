services:
  # IB Gateway - Headless IBKR API gateway
  ib-gateway:
    image: unusualalpha/ib-gateway-docker:latest
    container_name: ib-gateway
    restart: unless-stopped
    environment:
      - IBKR_ACCOUNT_TYPE=${IBKR_ACCOUNT_TYPE:-paper}
      - IBKR_USERNAME=${IBKR_USERNAME:-}
      - IBKR_PASSWORD=${IBKR_PASSWORD:-}
      - IBKR_READ_ONLY_API=${IBKR_READ_ONLY_API:-true}
      - IBKR_SOCKET_PORT=${IBKR_SOCKET_PORT:-4002}
      - TZ=${TZ:-America/New_York}
    ports:
      - "${IBKR_SOCKET_PORT:-4002}:4002"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4002"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - ib-gateway-data:/root/Jts
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for optional state persistence
  redis:
    image: redis:7-alpine
    container_name: langgraph-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-trading-bot
    restart: unless-stopped
    depends_on:
      ib-gateway:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Redis configuration (optional - falls back to file-based if not available)
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # IBKR configuration (connect to ib-gateway container)
      - IBKR_HOST=${IBKR_HOST:-ib-gateway}
      - IBKR_PORT=${IBKR_PORT:-4002}
      - IBKR_CLIENT_ID=${IBKR_CLIENT_ID:-1}
      - IBKR_DATA_CLIENT_ID=${IBKR_DATA_CLIENT_ID:-2}
      - IBKR_ACCOUNT_TYPE=${IBKR_ACCOUNT_TYPE:-paper}
      
      # Bybit (if using)
      - BYBIT_API_KEY=${BYBIT_API_KEY:-}
      - BYBIT_API_SECRET=${BYBIT_API_SECRET:-}
      
      # Alpaca (if using)
      - ALPACA_API_KEY=${ALPACA_API_KEY:-}
      - ALPACA_API_SECRET=${ALPACA_API_SECRET:-}
      - ALPACA_BASE_URL=${ALPACA_BASE_URL:-https://paper-api.alpaca.markets}
      
      # Data providers
      - POLYGON_API_KEY=${POLYGON_API_KEY:-}
      
      # LLM
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      
      # Alerts
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      
      # Trading
      - PEARLALGO_PROFILE=${PEARLALGO_PROFILE:-paper}
      - LIVE_STARTING_BALANCE=${LIVE_STARTING_BALANCE:-50000.0}
      
      # Python
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      # Persist logs and data
      - ./logs:/app/logs
      - ./data:/app/data
      - ./signals:/app/signals
      - ./reports:/app/reports
      - ./state_cache:/app/state_cache
      - ./telemetry:/app/telemetry
      # Config
      - ./config:/app/config
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Streamlit Dashboard (optional)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-dashboard
    restart: unless-stopped
    command: streamlit run scripts/streamlit_dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./signals:/app/signals
      - ./reports:/app/reports
      - ./state_cache:/app/state_cache
      - ./telemetry:/app/telemetry
      - ./config:/app/config
    networks:
      - trading-network
    depends_on:
      - trading-bot

  # Health check endpoint service (optional - for external monitoring)
  healthz:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: langgraph-healthz
    restart: unless-stopped
    command: python -m pearlalgo.utils.health --port 8080
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    networks:
      - trading-network
    depends_on:
      - trading-bot
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  trading-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  ib-gateway-data:
    driver: local
