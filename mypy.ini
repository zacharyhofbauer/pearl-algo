[mypy]
# PearlAlgo Type Checking Configuration
# Run: mypy src/pearlalgo

python_version = 3.12
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = false
show_error_codes = true
show_column_numbers = true
pretty = true

# Start with relaxed settings, tighten over time
strict = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true

# Allow dynamic typing for external libs without stubs
ignore_missing_imports = true

# Exclude test files for now (focus on src)
exclude = (?x)(
    ^tests/
    | ^scripts/
    | conftest\.py$
  )

# Per-module strictness (gradually tighten)
[mypy-pearlalgo.utils.*]
disallow_untyped_defs = false
check_untyped_defs = true

[mypy-pearlalgo.config.*]
disallow_untyped_defs = false
check_untyped_defs = true

[mypy-pearlalgo.data_providers.*]
disallow_untyped_defs = false
check_untyped_defs = true

[mypy-pearlalgo.learning.*]
disallow_untyped_defs = false
check_untyped_defs = true

[mypy-pearlalgo.execution.*]
disallow_untyped_defs = false
check_untyped_defs = true

[mypy-pearlalgo.market_agent.*]
disallow_untyped_defs = false
check_untyped_defs = true

[mypy-pearlalgo.trading_bots.*]
disallow_untyped_defs = false
check_untyped_defs = true

# Ignore specific third-party libraries without stubs
[mypy-ib_insync.*]
ignore_missing_imports = true

[mypy-telegram.*]
ignore_missing_imports = true

[mypy-loguru.*]
ignore_missing_imports = true
