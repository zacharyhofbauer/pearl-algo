name: Web App CI

on:
  push:
    branches: ["**"]
    paths:
      - 'apps/pearl-algo-app/**'
      - '.github/workflows/web-app-ci.yml'
  pull_request:
    paths:
      - 'apps/pearl-algo-app/**'
      - '.github/workflows/web-app-ci.yml'

defaults:
  run:
    working-directory: apps/pearl-algo-app

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/pearl-algo-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type checking
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/pearl-algo-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: web-app-coverage
          path: apps/pearl-algo-app/coverage/

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-and-type-check, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/pearl-algo-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Skip API calls during build
          NEXT_PUBLIC_API_URL: http://localhost:8001

      - name: Verify build output
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed - .next directory not found"
            exit 1
          fi
          echo "Build successful"
          ls -la .next/
