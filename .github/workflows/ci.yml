name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package (dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      # Pearl AI eval removed (restructure Phase 2D)

      - name: IBKR vendor guard
        run: |
          python - <<'PY'
          from pathlib import Path
          ibkr = Path("ibkr")
          allowed = {"README.md", ".gitkeep"}
          extras = []
          if ibkr.exists():
              for path in ibkr.rglob("*"):
                  if path.is_dir():
                      continue
                  rel = path.relative_to(ibkr).as_posix()
                  if rel in allowed:
                      continue
                  extras.append(rel)
          if extras:
              print("Unexpected files under ibkr/:")
              for item in extras:
                  print(f"  - {item}")
              raise SystemExit(1)
          print("IBKR vendor guard passed")
          PY

      - name: Byte-compile source (sanity)
        run: |
          python -m compileall src/pearlalgo

      # Ruff: enforce a small "bug catching" subset, and keep the full report informational.
      - name: Ruff (bug checks)
        run: |
          ruff check src/pearlalgo --select F821,E722

      - name: Ruff (informational)
        continue-on-error: true
        run: |
          ruff check src/pearlalgo --statistics

      - name: Type checking (mypy)
        continue-on-error: true
        run: |
          mypy src/pearlalgo --no-error-summary 2>&1 | head -100 || true
          echo "::notice::Type checking completed (informational mode)"

      - name: Architecture boundaries (enforced)
        run: |
          python scripts/testing/check_architecture_boundaries.py --enforce

      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install --upgrade pip-audit
          python -m pip_audit .

      - name: Secret scan (tracked files)
        run: |
          python scripts/testing/check_no_secrets.py

      - name: Doc reference audit
        run: |
          python scripts/testing/check_doc_references.py

      - name: Stale code audit (orphan allowlist)
        run: |
          python scripts/testing/report_orphan_modules.py --enforce

      - name: Security scan (Trivy - filesystem/dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
        continue-on-error: true  # Informational for now

      - name: Multi-market smoke test
        run: |
          python scripts/testing/smoke_multi_market.py

      - name: Unit tests (skip external deps)
        env:
          MPLBACKEND: Agg
        run: |
          pytest -m "not requires_ibkr and not requires_telegram" --cov-report=xml

      - name: Generate coverage badge
        run: |
          python scripts/testing/generate_coverage_badge.py

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.xml
            docs/coverage-badge.svg
