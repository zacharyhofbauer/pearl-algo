name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .[dev]
      - name: Lint (ruff check)
        run: ruff check . --exclude legacy_backup --exclude legacy
      - name: Format (ruff format)
        run: ruff format --check . --exclude legacy_backup --exclude legacy
      - name: Tests with coverage
        run: |
          pytest tests/ -v --cov=src/pearlalgo --cov-report=term-missing --cov-report=xml
      - name: Build Docker image
        run: docker build -t pearlalgo:test .
