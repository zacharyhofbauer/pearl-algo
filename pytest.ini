[pytest]
# Restrict pytest collection to the canonical suite under `tests/`.
# The `scripts/testing/` directory contains runnable test/validation scripts that are not
# intended to be collected as pytest tests.
testpaths =
    tests

# Ensure the repo root is on sys.path so the `tests` package can be imported reliably.
# Coverage reporting: generates HTML report and fails if coverage drops below threshold
# Note: Current coverage is ~44%. Target should increase over time as tests are added.
addopts = --import-mode=prepend --cov=src/pearlalgo --cov-report=html --cov-report=term-missing --cov-fail-under=40

# Test markers for categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external dependencies)
    e2e: End-to-end tests (full system)
    slow: Slow tests (may take significant time)
    asyncio: marks tests as async (using pytest-asyncio)

filterwarnings =
    ignore:There is no current event loop:DeprecationWarning
    ignore:'T' is deprecated and will be removed in a future version:FutureWarning
norecursedirs = legacy
