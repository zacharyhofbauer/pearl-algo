[pytest]
# Pytest configuration for PearlAlgo tests
# All tests use actual production code from src/pearlalgo/ dynamically
# No code duplication - tests import directly from installed package

# Test discovery
# Restrict pytest collection to the canonical suite under `tests/`.
# The `scripts/testing/` directory contains runnable test/validation scripts that are not
# intended to be collected as pytest tests.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add project root and src to Python path so tests can import actual code
# This ensures tests use production code dynamically without file duplication
pythonpath = 
    src
    .

# Test execution options
# --import-mode=prepend: Ensures tests can import from src/pearlalgo/
# Coverage reporting: generates HTML report and fails if coverage drops below threshold
# Note: Coverage ratcheted up from 40% -> 42% after adding signal_handler, order_manager,
# api_server, and error recovery tests. Target should increase over time as tests are added.
addopts = 
    --import-mode=prepend
    --cov=src/pearlalgo
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=50
    -v
    --tb=short
    --showlocals

# Test markers for categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require external dependencies)
    e2e: End-to-end tests (full system)
    slow: Slow tests (may take significant time)
    asyncio: marks tests as async (using pytest-asyncio)
    requires_ibkr: Tests that require IBKR connection
    requires_telegram: Tests that require Telegram credentials
    visual: Visual regression tests

# Filter warnings
filterwarnings =
    ignore:There is no current event loop:DeprecationWarning
    ignore:'T' is deprecated and will be removed in a future version:FutureWarning

# Exclude directories from test discovery
norecursedirs = legacy

# Coverage configuration
[coverage:run]
source = src/pearlalgo
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
