# Micro Contracts - Correct IBKR Symbol Mapping
# Some micro contracts may need different symbols or exchanges

# Working micro contracts (verified):
# - MGC: Micro Gold (COMEX) ✅
# - MYM: Micro Dow (CBOT) ✅  
# - MCL: Micro Crude (NYMEX) ✅
# - MNQ: Micro NASDAQ (CME) ✅
# - MES: Micro S&P 500 (CME) ✅

# Problematic:
# - MRTY: Micro Russell 2000 - May need to use RTY instead or different exchange
#   Alternative: Use regular RTY with smaller position size

# Recommended symbols for micro strategy:
micro_symbols:
  - MGC  # Micro Gold (COMEX)
  - MYM  # Micro Dow (CBOT)
  - MCL  # Micro Crude (NYMEX)
  # MRTY may not be available - use RTY instead or skip
  # - MRTY  # Micro Russell (may need ICE exchange or different symbol)

# Alternative: Use regular contracts with smaller size
regular_symbols_small_size:
  - GC   # Gold (use 1 contract instead of 5 micro)
  - YM   # Dow (use 1 contract instead of 5 micro)
  - CL   # Crude (use 1 contract instead of 5 micro)
  - RTY  # Russell (use 1 contract instead of 5 micro)

