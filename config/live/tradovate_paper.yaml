account:
  name: tradovate_paper
  display_name: Tradovate Paper
  badge: PAPER
  badge_color: purple

symbol: MNQ
timeframe: 1m
scan_interval: 30

strategy:
  active: composite_intraday
  enforce_session_window: false
  enabled_signals:
  - composite_intraday
  enable_dynamic_sizing: true
  base_contracts: 1
  high_conf_contracts: 2
  max_conf_contracts: 3
  high_conf_threshold: 0.8
  max_conf_threshold: 0.9
  winning_signal_types:
  - composite_intraday
  session_position_scaling:
    enabled: true
    london_multiplier: 0.8
    tokyo_multiplier: 0.7
    ny_multiplier: 1.5
  signal_type_size_multipliers:
    composite_intraday: 1.0

strategies:
  composite_intraday:
    ema_fast: 9
    ema_slow: 21
    # AUDIT 2026-04-10: bumped from 0.4 → 0.55. The IBKR-era winning system
    # ran ~0.55 confidence floor; 0.4 was admitting low-quality signals.
    min_confidence: 0.60
    min_confidence_long: 0.60
    min_confidence_short: 0.72
    # AUDIT 2026-04-10: widened from 1.5 → 2.5 SL mult and 2.5 → 4.0 TP mult.
    # IBKR-era winners had avg SL 54pt / TP 80pt. Current was 16pt/26pt — ~3x
    # too tight, jamming the strategy into the 0-15min losing bucket.
    stop_loss_atr_mult: 2.5
    take_profit_atr_mult: 4.0
    volatile_sl_mult: 1.3
    volatile_tp_mult: 1.3
    ranging_sl_mult: 0.8
    ranging_tp_mult: 0.7
    allow_vwap_cross_entries: true
    allow_vwap_retest_entries: true
    allow_trend_momentum_entries: true
    trend_momentum_atr_mult: 0.5
    allow_trend_breakout_entries: true
    trend_breakout_lookback_bars: 5
    volume_ma_length: 20
    sr_length: 130
    sr_atr_mult: 0.5
    tbt_period: 10
    tbt_trend_type: wicks
    sd_threshold_pct: 10.0
    sd_resolution: 50
    vwap_std_dev: 1.0
    # AUDIT 2026-04-10: disabled the 3 trigger types added in the 03-30 revamp.
    # trades.db shows they fire rarely (2 SMC trades in 173) but contribute to
    # signal scoring noise. Restore the legacy 4-trigger pearlbot core.
    allow_orb_entries: false
    allow_vwap_2sd_entries: false
    allow_smc_entries: false
    adx_period: 14
    adx_trending_threshold: 25.0
    adx_ranging_threshold: 20.0
session:
  start_time: '18:00'
  end_time: '16:00'
  timezone: America/New_York

risk:
  max_risk_per_trade: 0.015
  max_drawdown: 0.1
  min_position_size: 1
  max_position_size: 5
  signal_type_size_multipliers:
    sr_bounce: 0.25
  signal_type_max_contracts:
    sr_bounce: 2

service:
  status_update_interval: 3600
  heartbeat_interval: 86400
  state_save_interval: 10
  connection_failure_alert_interval: 600
  data_quality_alert_interval: 300
  dashboard_chart_enabled: false
  dashboard_chart_interval: 3600
  dashboard_chart_timeframe: 5m
  dashboard_chart_lookback_hours: 6
  enable_new_bar_gating: false
  adaptive_cadence_enabled: true
  scan_interval_active_seconds: 15
  scan_interval_idle_seconds: 60
  scan_interval_market_closed_seconds: 300
  scan_interval_paused_seconds: 60
  scan_interval_velocity_seconds: 1.5
  velocity_mode_enabled: true
  velocity_atr_expansion_threshold: 1.2
  velocity_volume_spike_threshold: 2.0

circuit_breaker:
  max_consecutive_errors: 10
  max_connection_failures: 50
  max_data_fetch_errors: 5
  pause_on_connection_failures: false

trading_circuit_breaker:
  # Direction gating is intentionally ENABLED in the current paper profile.
  # Given the live analytics, this acts as a conservative long-bias / regime
  # sanity check instead of letting every low-context short through.
  enable_direction_gating: true
  direction_gating_min_confidence: 0.70
  # Regime avoidance is intentionally ENABLED, but only for the weak regimes
  # we still want to avoid in paper (`ranging`, `volatile`). The earlier audit
  # issue was blocking `trending_up`; that is no longer part of blocked_regimes.
  enable_regime_avoidance: true
  blocked_regimes:
    - ranging
    - volatile
  regime_avoidance_min_confidence: 0.70
  max_concurrent_positions: 5
  # Position Clustering — DISABLED 2026-04-10. Default was 0.5% which on MNQ
  # at $25k = 125pt = ~8x the new SL distance. Was rejecting EVERY signal that
  # came in within 125pt of an open position in the same direction, killing
  # ~63% of post-restart signals (post-audit conversion dropped from 15% to 3%).
  # The user's max_position_size_per_order=1 + max_position_size=5 setup is
  # explicitly designed for stacking 1-contract adds; clustering was incompatible.
  # Position management is handled by max_concurrent_positions and cooldown_seconds.
  min_price_distance_pct: 0.0

guardrails:
  signal_gate_enabled: false
  mode: enforce
  max_consecutive_losses: 3
  consecutive_loss_cooldown_minutes: 30
  max_session_drawdown: 800.0
  max_daily_drawdown: 800.0
  max_daily_profit: 3000.0
  drawdown_cooldown_minutes: 60
  rolling_window_trades: 30
  min_rolling_win_rate: 0.30
  win_rate_cooldown_minutes: 30
  require_winning_trade_to_resume: true
  # Equity Curve Filter — halve size when equity drops below 20-trade EMA
  enable_equity_curve_filter: true
  equity_curve_lookback: 20
  equity_curve_half_size_below_ma: true
  equity_curve_halt_atr_mult: 1.5
  # Tiered Consecutive Loss Response — scale down before halting
  enable_tiered_loss_response: true
  tiered_loss_levels:
    - losses: 3
      risk_scale: 0.5
      action: reduce
    - losses: 5
      risk_scale: 0.25
      action: reduce
    - losses: 7
      risk_scale: 0.0
      action: halt
      cooldown_minutes: 30
    - losses: 10
      risk_scale: 0.0
      action: halt_session
  # Session Profit Lock — protect realized gains from afternoon give-back.
  # When enabled: once today's Tradovate net realized P&L crosses the
  # activation threshold, arm a floor at HWM × (1 − retracement_pct).  If
  # realized P&L ever retraces to that floor, fire the kill-switch path
  # (cancel orders + flatten positions + disarm execution) and block new
  # signals via cooldown until the next 18:00 ET session boundary.
  #
  # Default off — flip to true to activate.  Tunable knobs so you can start
  # conservative ($300 activation, 35% retracement) and tighten once you've
  # watched it work for a few days.  Uses the BROKER's net realized P&L via
  # sync_broker_pnl, NOT the internal gross accumulator.
  enable_session_profit_lock: true
  session_profit_lock_activation_usd: 250.0
  session_profit_lock_retracement_pct: 0.25
  session_profit_lock_min_floor_usd: 50.0
  session_profit_lock_cooldown_minutes: 600
  # Time-of-Day Risk Windows — reduce exposure during historically weak hours
  enable_tod_risk_scaling: true
  tod_risk_windows:
    # Session open chop — data shows -$873 here, near 0% WR
    - start_hour_et: 18
      end_hour_et: 20
      risk_scale: 0.0
    # Late evening bleed — -$460 at 23:00 UTC
    - start_hour_et: 22
      end_hour_et: 23
      risk_scale: 0.25
    # Pre-London bleed — -$828 at 04:00-05:00 ET
    - start_hour_et: 4
      end_hour_et: 6
      risk_scale: 0.25
    # NY open chop — -$468 at 08:00-10:00 ET
    - start_hour_et: 8
      end_hour_et: 10
      risk_scale: 0.25
    # Afternoon give-back
    - start_hour_et: 15
      end_hour_et: 16
      risk_scale: 0.5
  # Volatility Risk Scaling — cut size when ATR expands
  enable_volatility_risk_scaling: true
  volatility_high_atr_ratio: 1.5
  volatility_high_risk_scale: 0.5
  volatility_extreme_atr_ratio: 2.0
  volatility_extreme_risk_scale: 0.0

data:
  buffer_size: 300
  buffer_size_5m: 300
  buffer_size_15m: 100
  historical_hours: 5
  multitimeframe_5m_hours: 25
  multitimeframe_15m_hours: 25
  performance_history_limit: 1000
  stale_data_threshold_minutes: 10
  connection_timeout_minutes: 30
  enable_base_cache: true
  base_refresh_seconds: 60
  enable_mtf_cache: true
  mtf_refresh_seconds_5m: 300
  mtf_refresh_seconds_15m: 900
  ibkr_data_client_id: 51

storage:
  sqlite_enabled: true
  async_writes_enabled: true
  async_queue_max_size: 1000
  async_queue_priority_trades: true

signals:
  enabled_signal_types:
  - pearlbot_pinescript
  - smc_fvg
  - smc_ob
  - smc_silver_bullet
  duplicate_window_seconds: 120
  min_risk_reward: 1.3
  duplicate_price_threshold_pct: 0.5
  volatility_threshold: 0.0001
  avoid_lunch_lull: false
  skip_overnight: false
  quality_score:
    enabled: true
    threshold: 0.35
    factors:
      confidence_weight: 0.3
      risk_reward_weight: 0.25
      regime_alignment_weight: 0.2
      volume_profile_weight: 0.15
      mtf_alignment_weight: 0.1
  prioritize_ny_session: false
  min_volume: 10
  explore:
    enabled: false
    min_confidence: 0.75
    min_risk_reward: 2.0
    include_quality_rejects: false
    bypass_regime_filters: false
  max_stop_points: 45.0
  adaptive_volatility_filter:
    enabled: false
    expansion_requirement: 2.0
    median_atr_threshold: 0.0003
  regime_filters:
    unified_strategy:
      allowed_regimes:
      - ranging
      - trending_bullish
      - trending_bearish

performance:
  max_records: 1000
  default_lookback_days: 7

virtual_pnl:
  enabled: false
  intrabar_tiebreak: take_profit
  notify_entry: true
  notify_exit: true

auto_flat:
  enabled: true
  daily_enabled: true
  daily_time: '16:00'
  friday_enabled: false
  friday_time: '16:55'
  weekend_enabled: false
  timezone: America/New_York
  notify: true

audit:
  retention_days: 90
  snapshot_retention_days: 365

composite_regime:
  enabled: true
  mtf_override_enabled: false
  chop_zone_low: 4.0
  chop_zone_high: 6.0
  chop_zone_min_confidence: 0.75
  volatile_stop_multiplier: 1.2

runner_mode:
  enabled: true
  breakeven_trigger_atr: 1.5
  runner_trigger_atr: 2.5
  runner_trail_distance_atr: 1.0
  breakeven_offset_points: 0.25

execution:
  enabled: true
  armed: false
  mode: paper
  adapter: tradovate
  enforce_protection_guard: true
  allow_reversal_on_opposite_signal: true
  max_position_size_per_order: 3
  max_positions: 5
  max_orders_per_day: 80
  max_daily_loss: 99999.0
  cooldown_seconds: 120
  symbol_whitelist:
  - MNQ
  ibkr_trading_client_id: 50
  ibkr_host: 127.0.0.1
  ibkr_port: 4001

challenge:
  enabled: false
  stage: tv_paper_eval
  start_balance: 50000.0
  profit_target: 3000.0
  max_drawdown: 2000.0
  max_contracts_mini: 5
  max_contracts_micro: 1
  consistency_pct: 0.5
  min_trading_days: 2
  t1_news_allowed: true
  auto_reset_on_pass: true
  auto_reset_on_fail: true

trailing_stop:
  enabled: true
  min_move_points: 0.5
  allow_external_override: true
  max_override_ttl_minutes: 120
  regime_adaptive: true
  override_bounds:
    trail_atr_multiplier:
    - 0.5
    - 2.0
    activation_atr_multiplier:
    - 0.5
    - 2.0
  phases:
  - name: breakeven
    activation_atr: 1.0
    trail_atr: 0.0
  - name: lock_profit
    activation_atr: 2.0
    trail_atr: 1.5
  - name: tight_trail
    activation_atr: 3.0
    trail_atr: 1.0

advanced_exits:
  quick_exit:
    enabled: true
    min_duration_minutes: 20
    max_mfe_threshold: 20
    min_mae_threshold: 60
  # AUDIT 2026-04-10: DISABLED. This was killing the 15-60min sweet spot.
  # At 10 min, if profit > 30pt, took 70% off — booking winners before they
  # could mature. IBKR-era data shows trades held 15+ min were the only ones
  # making money; trades exited <15 min lost ~$7k net.
  time_based_exit:
    enabled: false
    min_duration_minutes: 10
    min_profit_threshold: 30
    take_percentage: 0.7
  stop_optimization:
    enabled: true
    mae_percentile: 75
  partial_runner:
    enabled: true
    breakeven_trigger_atr: 1.5
    tight_trail_trigger_atr: 2.5
    tight_trail_distance_atr: 1.0
    breakeven_offset: 0.25
    # AUDIT 2026-04-10: was true, deleting the original TP target so the
    # runner relied solely on a trailing stop. On choppy MNQ that yanks
    # winners on minor pullbacks. Set false so winners can reach the wider
    # take_profit_atr_mult target we just set.
    remove_fixed_tp: false
  max_hold_exit:
    enabled: true
    max_duration_minutes: 180
