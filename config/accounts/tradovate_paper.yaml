# ==========================================================================
# Tradovate Paper Account Configuration
# ==========================================================================
# Extends config/base.yaml with account-specific overrides.
#
# Usage: python -m pearlalgo.market_agent.main \
#          --config config/accounts/tradovate_paper.yaml \
#          --data-dir data/tradovate/paper
# ==========================================================================

# Account identity
account:
  name: tradovate_paper
  display_name: "Tradovate Paper"
  badge: "PAPER"
  badge_color: "purple"
  telegram_prefix: "TV-PAPER"

# Challenge: Tradovate Paper 50K Rapid Evaluation
challenge:
  enabled: false
  stage: tv_paper_eval
  start_balance: 50000.0
  profit_target: 3000.0
  max_drawdown: 2000.0
  max_contracts_mini: 5
  max_contracts_micro: 1
  consistency_pct: 0.50
  min_trading_days: 2
  t1_news_allowed: true
  auto_reset_on_pass: true
  auto_reset_on_fail: true

# Execution: Tradovate Demo
execution:
  enabled: true
  armed: true
  mode: paper
  adapter: tradovate
  enforce_protection_guard: true
  max_positions: 5  # CRITICAL: Reduced from 20 to match MFF limit
  max_position_size_per_order: 1  # HARD CAP: never send more than 1 contract per order
  max_orders_per_day: 500
  max_daily_loss: 1800.0
  cooldown_seconds: 30
  symbol_whitelist:
    - MNQ
  ibkr_trading_client_id: 50
  ibkr_host: "127.0.0.1"
  ibkr_port: 4001

# IBKR data provider override (avoid client ID clash)
data:
  # IMPORTANT: Uses IBKR for market data (better quality/latency). Tradovate only for execution.
  ibkr_data_client_id: 51

# Circuit breaker: never pause for connection/data blips (IBKR data-only; execution is Tradovate)
circuit_breaker:
  max_connection_failures: 50
  pause_on_connection_failures: false

# Trading circuit breaker overrides
trading_circuit_breaker:
  enabled: true
  mode: enforce
  enable_tv_paper_eval_gate: false
  tv_paper_max_contracts_mini: 5
  tv_paper_max_contracts_micro: 1
  tv_paper_trading_start_hour_et: 18
  tv_paper_trading_end_hour_et: 16
  tv_paper_trading_end_minute_et: 10
  tv_paper_near_max_loss_buffer: 200.0
  tv_paper_enable_news_blackout: true
  max_consecutive_losses: 5
  max_session_drawdown: 1800.0
  max_daily_drawdown: 1800.0
  max_concurrent_positions: 5
  enable_session_filter: false
  enable_direction_gating: true
  direction_gating_min_confidence: 0.65
  enable_regime_avoidance: true
  blocked_regimes:
    - ranging
    - volatile
  regime_avoidance_min_confidence: 0.70

# Telegram notification tier
telegram:
  notification_tier: critical  # ONLY entry/exit/circuit breaker (no periodic summaries)

# Auto-flat: disabled (Tradovate bracket orders handle exits)
auto_flat:
  enabled: true
  daily_enabled: false
  friday_enabled: false
  weekend_enabled: false
  notify: false

# Risk management: MFF compliance
risk:
  min_position_size: 1
  max_position_size: 1  # CRITICAL: Each trade = 1 contract (MFF limit is 5 total)

# Service: Disable periodic dashboard updates
service:
  dashboard_chart_enabled: false  # Disable periodic status summaries

# CRITICAL: Disable local paper simulation
# Circuit breaker should ONLY track real Tradovate trades
virtual_pnl:
  enabled: false

