account:
  name: tradovate_paper
  display_name: Tradovate Paper
  badge: PAPER
  badge_color: purple
  telegram_prefix: TV-PAPER
challenge:
  enabled: false
  stage: tv_paper_eval
  start_balance: 50000.0
  profit_target: 3000.0
  max_drawdown: 2000.0
  max_contracts_mini: 5
  max_contracts_micro: 1
  consistency_pct: 0.5
  min_trading_days: 2
  t1_news_allowed: true
  auto_reset_on_pass: true
  auto_reset_on_fail: true
execution:
  enabled: true
  armed: true
  mode: paper
  adapter: tradovate
  enforce_protection_guard: true
  max_positions: 5
  max_position_size_per_order: 1
  max_orders_per_day: 500
  max_daily_loss: 1150.0
  cooldown_seconds: 30
  allow_reversal_on_opposite_signal: true
  symbol_whitelist:
  - MNQ
  ibkr_trading_client_id: 50
  ibkr_host: 127.0.0.1
  ibkr_port: 4001
data:
  ibkr_data_client_id: 51
circuit_breaker:
  max_connection_failures: 50
  pause_on_connection_failures: false
trading_circuit_breaker:
  enabled: true
  mode: enforce
  enable_tv_paper_eval_gate: false
  tv_paper_max_contracts_mini: 5
  tv_paper_max_contracts_micro: 1
  tv_paper_trading_start_hour_et: 18
  tv_paper_trading_end_hour_et: 16
  tv_paper_trading_end_minute_et: 10
  tv_paper_near_max_loss_buffer: 200.0
  tv_paper_enable_news_blackout: true
  max_consecutive_losses: 5
  max_session_drawdown: 1800.0
  max_daily_drawdown: 1150.0
  max_concurrent_positions: 5
  enable_session_filter: false
  allowed_sessions:
  - overnight
  - premarket
  - morning
  - midday
  - afternoon
  - closing
  enable_direction_gating: false
  direction_gating_min_confidence: 0.50
  enable_regime_avoidance: false
  blocked_regimes: []
  regime_avoidance_min_confidence: 0.7
telegram:
  notification_tier: debug
auto_flat:
  enabled: true
  daily_enabled: true
  daily_time: '16:30'
  friday_enabled: false
  weekend_enabled: false
  notify: true
risk:
  min_position_size: 1
  max_position_size: 1
session:
  start_time: "18:00"
  end_time: "15:45"
  timezone: "America/New_York"
service:
  dashboard_chart_enabled: false
trailing_stop:
  enabled: true
  min_move_points: 0.5
  phases:
  - name: breakeven
    activation_atr: 1.0
    trail_atr: 0.0
  - name: lock_profit
    activation_atr: 2.0
    trail_atr: 1.5
  - name: tight_trail
    activation_atr: 3.0
    trail_atr: 1.0
ml_filter:
  mode: shadow
virtual_pnl:
  enabled: false
advanced_exits:
  quick_exit:
    enabled: true
    min_duration_minutes: 20
    max_mfe_threshold: 20
    min_mae_threshold: 60
  time_based_exit:
    enabled: true
    min_duration_minutes: 10
    min_profit_threshold: 30
    take_percentage: 0.7
  stop_optimization:
    enabled: true
    mae_percentile: 75
pearl_bot_auto:
  min_confidence: 0.40
  min_confidence_long: 0.40
  min_confidence_short: 0.40
  ema_fast: 9
  ema_slow: 21
  allow_vwap_cross_entries: true
  allow_vwap_retest_entries: true
  allow_trend_momentum_entries: true
  allow_trend_breakout_entries: true
  volume_ma_length: 20
  sr_length: 130
  sr_atr_mult: 0.5
  tbt_period: 10
  tbt_trend_type: wicks
  sd_threshold_pct: 10.0
  sd_resolution: 50
  vwap_std_dev: 1.0

# Strategy params at top level (required by pearl_bot_auto.py indicator functions)
volume_ma_length: 20
sr_length: 130
sr_atr_mult: 0.5
tbt_period: 10
tbt_trend_type: wicks
sd_threshold_pct: 10.0
sd_resolution: 50
vwap_std_dev: 1.0
min_confidence: 0.40
min_confidence_long: 0.40
min_confidence_short: 0.40
