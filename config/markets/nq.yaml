symbol: "MNQ"
timeframe: "1m"
scan_interval: 30

# "Aggressive for tonight" overrides (easy to revert):
# - 1m bars + faster EMAs -> more frequent signals
# - Lower confidence floor -> allows baseline EMA+VWAP setups through
signals:
  min_confidence: 0.40
  min_risk_reward: 1.30

# Strategy-specific overrides for `trading_bots/pearl_bot_auto.py`
pearl_bot_auto:
  ema_fast: 5
  ema_slow: 13
  allow_vwap_cross_entries: true
  allow_vwap_retest_entries: true
  allow_trend_momentum_entries: true
  trend_momentum_atr_mult: 0.5
  allow_trend_breakout_entries: true
  trend_breakout_lookback_bars: 5

# TEMP: Allow New York morning session trades (disable time-of-day filter)
# Revert by removing this block or setting enable_session_filter: true
trading_circuit_breaker:
  enable_session_filter: false
