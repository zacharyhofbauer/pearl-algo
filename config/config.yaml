symbol: MNQ
timeframe: 1m
scan_interval: 30
session:
  start_time: '18:00'
  end_time: '15:45'
  timezone: 'America/New_York'  # Trading day runs 6PM-3:45PM ET
telegram:
  enabled: true
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
telegram_ui:
  compact_metrics_enabled: true
  show_progress_bars: false
  show_volume_metrics: true
  compact_metric_width: 10
risk:
  max_risk_per_trade: 0.015  # Increased from 0.01 for better R:R
  max_drawdown: 0.1
  stop_loss_atr_multiplier: 4.0  # Widened - stops were hitting predictable areas
  take_profit_risk_reward: 1.5  # Reduced from 2.0 for more realistic targets
  min_position_size: 5
  max_position_size: 50
  signal_type_size_multipliers:
    sr_bounce: 0.25
  signal_type_max_contracts:
    sr_bounce: 2
service:
  status_update_interval: 3600
  heartbeat_interval: 86400
  state_save_interval: 10
  connection_failure_alert_interval: 600
  data_quality_alert_interval: 300
  dashboard_chart_enabled: true
  dashboard_chart_interval: 3600
  dashboard_chart_timeframe: 5m
  dashboard_chart_lookback_hours: 6
  enable_new_bar_gating: true
  adaptive_cadence_enabled: true
  scan_interval_active_seconds: 5
  scan_interval_idle_seconds: 30
  scan_interval_market_closed_seconds: 300
  scan_interval_paused_seconds: 60
  scan_interval_velocity_seconds: 1.5
  velocity_mode_enabled: true
  velocity_atr_expansion_threshold: 1.2
  velocity_volume_spike_threshold: 2.0
circuit_breaker:
  max_consecutive_errors: 10
  max_connection_failures: 10
  max_data_fetch_errors: 5

# Trading circuit breaker (risk management for trading losses)
trading_circuit_breaker:
  enabled: true
  mode: warn_only  # warn_only = no blocking, enforce = block signals
  max_consecutive_losses: 5
  max_session_drawdown: 500.0
  max_daily_drawdown: 1000.0
  max_concurrent_positions: 5
  # Session filter - skip signals during historically poor-performing time windows
  # Based on data: overnight/close/midday = good, morning/afternoon/premarket = bad
  enable_session_filter: true
  allowed_sessions:
    - overnight    # 6PM-4AM ET
    - premarket    # 4AM-6AM ET
    - morning      # 6AM-10AM ET
    - midday       # 10AM-2PM ET
    - afternoon    # 2PM-5PM ET
    - close        # 5PM-6PM ET
  # All sessions enabled for maximum trading opportunity
  
  # =========================================================================
  # Phase 1: Direction gating by market regime (ENABLED by default)
  # Based on data: shorts underperform longs (40% vs 47% WR)
  # trending_up: 74% WR, ranging: 0% WR, volatile: 0% WR, trending_down: 40% WR
  # =========================================================================
  enable_direction_gating: false
  direction_gating_min_confidence: 0.70  # Disabled - allowing all trade directions
  # Rules: trending_up -> long only, trending_down -> short only
  #        ranging/volatile/unknown -> long only (conservative)
  
  # =========================================================================
  # Phase 2: Regime avoidance (OFF by default - shadow measurement)
  # Will log "would-have-blocked" for ranging/volatile to validate impact
  # =========================================================================
  enable_regime_avoidance: false  # Start OFF; turn on after validating shadow data
  blocked_regimes:
    - ranging      # 0W/12L (0% WR) in recent data
    - volatile     # 0W/2L (0% WR) in recent data
  regime_avoidance_min_confidence: 0.70
  
  # =========================================================================
  # Phase 3: Trigger-based de-risking (OFF by default - shadow measurement)
  # =========================================================================
  enable_trigger_filters: false  # Start OFF
  ema_cross_require_volume: true   # ema_cross (39% WR) needs volume confirmation
  low_regime_require_volume: true  # Require volume in ranging/volatile regimes
  
  # =========================================================================
  # Phase 4: ML chop shield (OFF - requires proven lift)
  # Only block ML FAIL after 50+ scored trades and 15%+ lift validated
  # =========================================================================
  enable_ml_chop_shield: false
  ml_min_scored_trades: 50
  ml_min_winrate_delta: 0.15       # PASS vs FAIL must differ by 15+ percentage points
  ml_chop_shield_regimes:
    - ranging
    - volatile

data:
  # Buffer sizes: sr_length=130, ATR(200) needs ~200 bars + margin
  # With timeframe=1m, need ~4+ hours / 250+ bars for all indicators
  buffer_size: 300
  buffer_size_5m: 300
  buffer_size_15m: 100
  historical_hours: 5
  multitimeframe_5m_hours: 25
  multitimeframe_15m_hours: 25
  performance_history_limit: 1000
  stale_data_threshold_minutes: 10
  connection_timeout_minutes: 30
  enable_base_cache: true
  base_refresh_seconds: 60
  enable_mtf_cache: true
  mtf_refresh_seconds_5m: 300
  mtf_refresh_seconds_15m: 900
storage:
  sqlite_enabled: true
  db_path: data/agent_state/NQ/trades.db
  async_writes_enabled: true
  async_queue_max_size: 1000
  async_queue_priority_trades: true
challenge:
  enabled: true
  start_balance: 50000.0
  max_drawdown: 2000.0
  profit_target: 3000.0
  auto_reset_on_pass: true
  auto_reset_on_fail: true
# ==========================================================================
# SIGNAL GENERATION THRESHOLDS
# ==========================================================================
# These thresholds control which signals pass through the pipeline.
# Signal flow: Strategy -> min_confidence -> quality_score -> ML filter
#
# THRESHOLD RELATIONSHIPS:
# - signals.min_confidence (0.55): Base filter - signals below this are never generated
# - signals.quality_score.threshold (0.35): Composite score combining multiple factors
# - signals.explore.min_confidence (0.75): Stricter threshold for experimental signals
# - ml_filter.min_probability (0.55): ML model's predicted win probability cutoff
#
# The 0.55 values are intentionally aligned as the "baseline" confidence level.
# Quality score uses a lower threshold (0.35) because it's a composite metric.
signals:
  duplicate_window_seconds: 120
  # Minimum strategy confidence to generate a signal (0.0-1.0)
  # Signals below this threshold are discarded at generation time
  min_confidence: 0.55
  min_risk_reward: 1.3
  duplicate_price_threshold_pct: 0.5
  volatility_threshold: 0.0001
  avoid_lunch_lull: false
  skip_overnight: false
  quality_score:
    enabled: true
    # Quality score combines: confidence, R:R, regime alignment, volume, MTF
    # Threshold is lower (0.35) because it's weighted differently than raw confidence
    threshold: 0.35
    factors:
      confidence_weight: 0.3
      risk_reward_weight: 0.25
      regime_alignment_weight: 0.2
      volume_profile_weight: 0.15
      mtf_alignment_weight: 0.1
  prioritize_ny_session: false
  min_volume: 10
  explore:
    enabled: false
    # Exploration mode uses stricter thresholds to limit noise
    min_confidence: 0.75
    min_risk_reward: 2.0
    include_quality_rejects: false
    bypass_regime_filters: false
  max_stop_points: 45.0
  adaptive_volatility_filter:
    enabled: false
    expansion_requirement: 2.0
    median_atr_threshold: 0.0003
  regime_filters:
    mean_reversion_long:
      allowed_regimes:
      - ranging
      - trending_bullish
      - trending_bearish
    mean_reversion_short:
      allowed_regimes:
      - ranging
      - trending_bearish
      - trending_bullish
    momentum_long:
      allowed_regimes:
      - ranging
      - trending_bullish
      - trending_bearish
    unified_strategy:
      allowed_regimes:
      - ranging
      - trending_bullish
      - trending_bearish
      # No session restrictions - can trade all day
strategy:
  enabled_signals:
  - unified_strategy
  enable_dynamic_sizing: true
  base_contracts: 3
  high_conf_contracts: 5
  max_conf_contracts: 8
  high_conf_threshold: 0.8
  max_conf_threshold: 0.9
  winning_signal_types:
  - unified_strategy
  signal_type_size_multipliers:
    unified_strategy: 1.0
  use_scalp_presets: false
  scalp_target_points: 20.0
  scalp_stop_points: 12.0
  session_position_scaling:
    enabled: true
    london_multiplier: 0.8
    tokyo_multiplier: 0.7
    ny_multiplier: 1.5
performance:
  max_records: 1000
  default_lookback_days: 7
virtual_pnl:
  enabled: true
  intrabar_tiebreak: take_profit
  notify_entry: true
  notify_exit: true
auto_flat:
  enabled: false
  daily_enabled: true
  daily_time: '15:55'
  friday_enabled: true
  friday_time: '16:55'
  weekend_enabled: true
  timezone: 'America/New_York'
  notify: true
hud:
  enabled: true
  show_rr_box: true
  rr_box_forward_bars: 30
  right_pad_bars: 30
  show_sessions: true
  show_session_names: true
  show_session_oc: true
  show_session_tick_range: true
  show_session_average: true
  show_supply_demand: true
  show_power_channel: true
  show_tbt_targets: true
  show_key_levels: true
  show_right_labels: true
  max_right_labels: 12
  right_label_merge_ticks: 4
  show_rsi: true
  rsi_period: 14
sessions:
- name: Tokyo
  session: 0000-0900
  timezone: UTC
  color: '#2962FF'
- name: London
  session: 0800-1600
  timezone: UTC
  color: '#FF9800'
- name: New York
  session: 1400-2100
  timezone: UTC
  color: '#089981'
indicators:
  enabled:
  - smart_money_divergence
  as_signals: false
  as_features: true
  supply_demand_zones:
    lookback: 50
    min_zone_size_atr: 0.5
    max_zones: 5
    zone_threshold_pct: 0.3
  power_channel:
    length: 130
    atr_mult: 2.0
  smart_money_divergence:
    lookback: 14
    pivot_lookback: 5
    rsi_period: 14
execution:
  enabled: false
  armed: false
  mode: dry_run
  adapter: ibkr
  max_positions: 1
  max_orders_per_day: 20
  max_daily_loss: 500.0
  cooldown_seconds: 60
  symbol_whitelist:
  - MNQ
  ibkr_trading_client_id: 20
  ibkr_host: ${IBKR_HOST}
  ibkr_port: ${IBKR_PORT}
learning:
  enabled: true
  mode: shadow
  feature_engineer_enabled: true
  features:
    short_window: 5
    medium_window: 20
    long_window: 50
    compute_price_action: true
    compute_volume_profile: true
    compute_microstructure: true
    compute_time_features: true
    compute_sequential: true
    compute_cross_timeframe: true
    normalize_features: true
    clip_outliers: true
    outlier_std: 3.0
  min_samples_per_type: 10
  explore_rate: 0.1
  decision_threshold: 0.3
  max_size_multiplier: 1.5
  min_size_multiplier: 0.5
  prior_alpha: 2.0
  prior_beta: 2.0
  decay_factor: 0.0
  contextual:
    enabled: true
    mode: shadow
    explore_rate: 0.1
    min_samples_per_context: 5
    # Bandit decision threshold (0.3): Lower than signal confidence because
    # this measures "probability of being better than average" not absolute win rate
    decision_threshold: 0.3
    fallback_to_global: true
swing_trading:
  enabled: true
  # Swing trades require higher confidence (0.75) due to longer hold times
  # and larger position sizes (2.5x multiplier)
  min_confidence: 0.75
  min_target_points: 50
  min_mtf_alignment: 0.8
  min_volume_ratio: 1.2
  max_hold_hours: 24
  position_size_multiplier: 2.5
# ==========================================================================
# ML SIGNAL FILTER (Probability-based gating)
# ==========================================================================
# Uses ML model to predict P(win) for each signal. In shadow mode, scores
# are logged for lift measurement but signals are not blocked.
ml_filter:
  enabled: true   # shadow-only (measurement; does NOT block)
  mode: shadow
  require_lift_to_block: true
  lift_lookback_trades: 200
  lift_min_trades: 50
  lift_min_winrate_delta: 0.05
  model_path: models/signal_filter_v1.joblib
  model_version: v1.0.0
  # ML probability threshold (0.55): Aligned with signals.min_confidence
  # Signals with P(win) < 0.55 would be blocked in live mode
  min_probability: 0.55
  shadow_threshold: 0.80  # shadow-only pass/fail split for lift measurement
  high_probability: 0.7
  adjust_sizing: false
  size_multiplier_min: 1.0
  size_multiplier_max: 1.0
  training_max_samples: 2000
  min_training_samples: 30
  retrain_interval_days: 7
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  calibrate_probabilities: true
knowledge:
  enabled: true
  index_dir: data/knowledge_index
  include_paths:
    - src
    - docs
    - config
    - scripts
    - pyproject.toml
  exclude_globs:
    - .env*
    - data/**
    - logs/**
    - tests/artifacts/**
    - .venv/**
    - ibkr/**
    - .git/**
  max_file_size_kb: 512
  chunk_max_chars: 2000
  chunk_overlap_chars: 200
  embedding_provider: auto
  embedding_model: text-embedding-3-small
  embedding_dim: 384
  use_faiss: false
  top_k: 6

# ==========================================================================
# AI COMMUNICATION (Pearl AI Chat + Briefings)
# ==========================================================================
# Pearl AI provides conversational chat and proactive briefings via Telegram.
# Requires OPENAI_API_KEY environment variable.
ai_chat:
  enabled: true
  model: gpt-4o-mini
  rate_limit_per_minute: 5
  max_response_length: 280
  temperature: 0.7
ai_briefings:
  enabled: true
  morning_time: "06:30"   # ET - Morning market prep
  eod_time: "16:00"       # ET - End of day summary (uses existing 3:55-4:05 window)
