# MNQ Trading Agent Configuration
# Prop firm style trading configuration for Mini NQ (MNQ) futures
# Optimized for intraday swings and quick scalps

# Trading Symbol
symbol: "MNQ"  # Mini NQ (1/10th size of NQ, prop-firm friendly)

# Timeframe
timeframe: "1m"  # 1-minute bars for decision stream (more opportunities), 5m/15m for MTF context

# Scan Interval (seconds) - base interval when adaptive_cadence_enabled is false
# When adaptive_cadence_enabled: true (default), this is overridden by the active/idle/closed intervals below
scan_interval: 30  # Base scan interval (overridden by adaptive cadence when enabled)

# Strategy session window (NY time / ET).
# This controls when the strategy is allowed to generate signals.
# Your prop-firm rule: positions must be flat by 16:10 ET, so we stop signals at 16:10.
session:
  start_time: "18:00"  # Session opens at 6:00 PM ET (Sunday 18:00 aligns with CME ETH reopen)
  end_time: "16:10"    # Session closes at 4:10 PM ET (before CME 17:00 close)

# Telegram Notifications
telegram:
  enabled: true
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

# Risk Management (Prop Firm Style)
risk:
  max_risk_per_trade: 0.01  # 1% max risk per trade (prop firm conservative)
  max_drawdown: 0.10        # 10% account drawdown limit (prop firm typical)
  stop_loss_atr_multiplier: 1.5  # Tighter stops for scalping
  take_profit_risk_reward: 1.5   # Target R:R for TP calculation (filter uses signals.min_risk_reward)
  min_position_size: 5      # Minimum MNQ contracts per trade
  max_position_size: 15     # Maximum MNQ contracts per trade

# Service intervals
service:
  status_update_interval: 900   # 15 minutes in seconds (dashboard interval)
  heartbeat_interval: 86400     # Disabled (1 day) - dashboard replaces heartbeat
  state_save_interval: 10       # Save state every N cycles
  connection_failure_alert_interval: 600  # 10 minutes in seconds
  data_quality_alert_interval: 300        # 5 minutes in seconds
  dashboard_chart_timeframe: "5m"  # Force 5-minute timeframe to match TradingView-style chart
  dashboard_chart_lookback_hours: 12  # Default chart window in notifications (12h)
  
  # Performance optimization: skip heavy analysis when bar hasn't advanced.
  # High leverage for 5m bars + 30s scan interval (5 of 6 cycles are repeats).
  enable_new_bar_gating: true   # Skip strategy.analyze() if df hasn't advanced (default ON)
  
  # Adaptive cadence: dynamically adjust scan interval based on market/session state.
  # Profile: fast_active (5s active, 30s idle, 300s closed, 60s paused)
  adaptive_cadence_enabled: true          # Master toggle for adaptive cadence
  scan_interval_active_seconds: 5         # When strategy_session_open (active trading)
  scan_interval_idle_seconds: 30          # When futures open but strategy session closed
  scan_interval_market_closed_seconds: 300  # When futures market closed (weekends, maintenance)
  scan_interval_paused_seconds: 60        # When service is paused

# Circuit breaker
circuit_breaker:
  max_consecutive_errors: 10
  max_connection_failures: 10
  max_data_fetch_errors: 5

# Data fetching
data:
  buffer_size: 100                 # Main buffer (1m bars)
  buffer_size_5m: 300              # 5m timeframe buffer (300 bars = 25h for 24h chart display)
  buffer_size_15m: 100             # 15m timeframe buffer (100 bars = 25h)
  historical_hours: 2              # Historical data fetch window
  multitimeframe_5m_hours: 25      # 5m MTF window (25h to support 24h dashboard chart)
  multitimeframe_15m_hours: 25     # 15m MTF window (25h)
  performance_history_limit: 1000  # Max performance records
  stale_data_threshold_minutes: 10 # Alert if data is older than this
  connection_timeout_minutes: 30   # Consider connection lost after this time without data
  
  # Caching options (reduce IBKR request volume)
  # When enabled, historical data is refreshed on a TTL rather than every scan cycle.
  # Level 1 real-time data (latest_bar) is still fetched every cycle for freshness.
  enable_base_cache: true          # Cache base timeframe historical data (reduces IBKR load)
  base_refresh_seconds: 60         # TTL for base historical cache (seconds)
  enable_mtf_cache: true           # Cache 5m/15m MTF historical data (reduces IBKR load)
  mtf_refresh_seconds_5m: 300      # TTL for 5m MTF cache (5 minutes)
  mtf_refresh_seconds_15m: 900     # TTL for 15m MTF cache (15 minutes)

# Signal generation
signals:
  duplicate_window_seconds: 300      # 5 minutes
  min_confidence: 0.50               # Minimum signal confidence
  min_risk_reward: 1.2               # R:R filter threshold (signals below this are rejected; tuned from 1.5)
  duplicate_price_threshold_pct: 0.5 # 0.5% price difference for duplicate detection
  volatility_threshold: 0.0004       # Tuned: reduce low-volatility gating (more signals in quieter regimes)
  avoid_lunch_lull: false            # Disabled - was blocking 72 signals
  
  # Volume gate (minimum volume per bar to consider for signals)
  # Referenced to 5m bars, scales for other timeframes (1m = 0.2x, 15m = 3x).
  # Set lower for 24h futures trading (Tokyo/London have lower volume than NY).
  # 100 for 5m → 20 for 1m bars, which passes most live bars (observed: 300-700).
  min_volume: 100
  
  # Stop-distance cap (risk control)
  # Caps maximum stop distance in points; scales target to preserve RR ratio.
  # 25 pts = $250 risk @ 5 MNQ contracts, $500 @ 10 contracts
  max_stop_points: 25.0              # Maximum stop distance in points (0 = disabled)
  
  # Per-signal-type regime/session filters
  # Signals are rejected if current regime/session is NOT in the allowed list.
  # Empty list = no filter (all regimes/sessions allowed).
  regime_filters:
    mean_reversion_long:
      allowed_regimes: [ranging]
      # Allow mean reversion even in high volatility (was too restrictive in backtests)
    mean_reversion_short:
      allowed_regimes: [ranging]
      # Allow mean reversion even in high volatility (was too restrictive in backtests)
    sr_bounce_short:
      # Allow counter-trend SR shorts even during trending_bullish (operator-approved)
    momentum_short:
      allowed_regimes: [trending_bearish]

# Strategy configuration (signal types, position sizing, A/B testing)
strategy:
  # Signal types to enable (based on backtest analysis)
  # Winners: sr_bounce (3 wins), mean_reversion_long (2 wins), momentum_short (1 win)
  enabled_signals:
    - sr_bounce
    - mean_reversion_long
    - mean_reversion_short
    - momentum_short
    - breakout_long
    - breakout_short
    - vwap_reversion
  
  # Signal types to disable (0 wins in backtest)
  disabled_signals:
    - momentum_long      # 0/5 wins - broken
    - engulfing_short    # 0/3 wins - broken
    - engulfing_long     # Untested - disabled for safety
  
  # Dynamic position sizing for $200+ scalp targets
  enable_dynamic_sizing: true
  base_contracts: 5          # Base position size
  high_conf_contracts: 15    # For confidence > 0.8
  max_conf_contracts: 25     # For confidence > 0.9 + winning signal type
  high_conf_threshold: 0.80
  max_conf_threshold: 0.90
  
  # Winning signal types (get max contracts when high confidence)
  winning_signal_types:
    - sr_bounce
    - mean_reversion_long
    - momentum_short
  
  # Scalp presets (optional - override ATR-based stops/targets)
  use_scalp_presets: false
  scalp_target_points: 20.0   # For $200 with 5 contracts
  scalp_stop_points: 12.0

# Strategy variants for A/B testing
# Use: python scripts/backtesting/run_variants.py --data-path <file>
strategy_variants:
  aggressive_scalp:
    enabled_signals: [sr_bounce, mean_reversion]
    disabled_signals: [momentum_long, engulfing, breakout]
    min_risk_reward: 1.0
    target_points: 20
    max_stop_points: 15
    base_contracts: 10
  
  conservative:
    enabled_signals: [sr_bounce, mean_reversion_long, momentum_short]
    disabled_signals: [momentum_long, engulfing, breakout]
    min_risk_reward: 1.5
    min_confidence: 0.75
  
  high_volume:
    enabled_signals: [sr_bounce, mean_reversion]
    disabled_signals: [momentum_long, engulfing]
    base_contracts: 15
    high_conf_contracts: 20
    max_conf_contracts: 25
    target_points: 10
    max_stop_points: 8

# Performance tracking
performance:
  max_records: 1000
  default_lookback_days: 7

# Virtual PnL tracking (signal grading without real IBKR fills)
virtual_pnl:
  enabled: true                       # Enable virtual TP/SL tracking for signal quality grading
  intrabar_tiebreak: "stop_loss"      # When TP and SL both touched in same bar: "stop_loss" (conservative) or "take_profit"
  notify_entry: true                  # Send Telegram entry notification when a virtual trade is opened
  notify_exit: true                   # Send Telegram exit notification when TP/SL is touched

# Chart HUD (TradingView-style overlays)
hud:
  enabled: true                       # Master toggle for all HUD elements
  show_rr_box: true                   # Risk/reward box (green TP zone, red SL zone)
  rr_box_forward_bars: 30             # How far forward to extend RR box
  right_pad_bars: 30                  # Right padding for labels + RR box

  # Sessions (Tokyo/London/NY shading)
  show_sessions: true
  show_session_names: true
  show_session_oc: true               # Session open/close lines
  show_session_tick_range: true
  show_session_average: true

  # Zones and channels
  show_supply_demand: true            # LuxAlgo-style supply/demand zones
  show_power_channel: true            # ChartPrime-style power channel
  show_tbt_targets: true              # Trendline breakout targets

  # Key levels (PDH/PDL/VWAP/POC)
  show_key_levels: true
  show_right_labels: true             # TradingView-style right-side labels
  max_right_labels: 12
  right_label_merge_ticks: 4          # Merge labels within N ticks

  # RSI panel
  show_rsi: true
  rsi_period: 14

# Session definitions (for chart HUD shading)
# Using Key Levels SpacemanBTC Pine defaults (UTC-based sessions)
sessions:
  - name: "Tokyo"
    session: "0000-0900"
    timezone: "UTC"
    color: "#2962FF"
  - name: "London"
    session: "0800-1600"
    timezone: "UTC"
    color: "#FF9800"
  - name: "New York"
    session: "1400-2100"
    timezone: "UTC"
    color: "#089981"

# =============================================================================
# EXECUTION (ATS - Automated Trading System)
# =============================================================================
# Controls automated order placement via an execution adapter (default: IBKR).
# SAFETY: Default is disabled + disarmed. Must explicitly enable and /arm to trade.
execution:
  enabled: false                    # Master toggle - must be true for any execution
  armed: false                      # Runtime toggle - must be true to place orders (use /arm command)
  mode: "dry_run"                   # "dry_run" (log only), "paper", or "live"
  adapter: "ibkr"                   # "ibkr" | "tradovate" (tradovate is dry_run-only skeleton for now)
  
  # Risk limits (hard caps)
  max_positions: 1                  # Maximum concurrent positions
  max_orders_per_day: 20            # Maximum orders per trading day
  max_daily_loss: 500.0             # Kill switch: max daily loss in dollars
  cooldown_seconds: 60              # Minimum seconds between orders for same signal type
  
  # Symbol whitelist (empty = all symbols allowed)
  symbol_whitelist:
    - MNQ
  
  # IBKR connection (separate client_id from data to avoid conflicts)
  ibkr_trading_client_id: 20        # Different from IBKR_CLIENT_ID (data)
  ibkr_host: "${IBKR_HOST}"
  ibkr_port: "${IBKR_PORT}"

# =============================================================================
# LEARNING (Adaptive Bandit Policy)
# =============================================================================
# Adjusts execution decisions based on observed signal type performance.
# Uses Thompson sampling (Beta-Bernoulli) per signal type.
# SAFETY: Default is shadow mode - learns but does NOT affect execution.
learning:
  enabled: true                     # Master toggle for adaptive policy
  mode: "shadow"                    # "shadow" (observe only) or "live" (affects execution)
  
  # Bandit configuration
  min_samples_per_type: 10          # Minimum samples before policy has opinion
  explore_rate: 0.1                 # Random explore rate (epsilon-greedy component)
  decision_threshold: 0.3           # Skip signal if P(win) < threshold
  
  # Position sizing adjustment (when mode=live)
  max_size_multiplier: 1.5          # Maximum size boost for high-confidence types
  min_size_multiplier: 0.5          # Minimum size reduction for low-confidence types
  
  # Prior distribution (Beta distribution parameters)
  # Start optimistic: alpha=2, beta=2 gives mean=0.5 with some uncertainty
  prior_alpha: 2.0
  prior_beta: 2.0
  
  # Decay factor for older observations (0 = no decay, 1 = full weight to recent)
  decay_factor: 0.0                 # Disabled for now - all observations equal weight

# =============================================================================
# PROP FIRM MODE (rule guardrails)
# =============================================================================
# Optional: adds "prop firm guardrails" that can:
# - Cap/adjust execution position size to firm max contracts
# - Prevent execution when near/over max loss limit
# - Enforce a conservative consistency cap (evaluation)
#
# NOTE: These guardrails use the agent's tracked (virtual) PnL unless/until a
# broker equity feed is wired in.
prop_firm:
  enabled: false
  profile: "mff_core_50k_eval"     # MyFundedFutures Core 50K (evaluation)

  # Core 50K parameters
  account_size: 50000
  profit_target: 3000
  max_loss_limit_eod: 2000          # Trailing max loss, locked at EOD
  daily_loss_limit: null            # Core: none
  max_contracts_mini: 3             # NQ
  max_contracts_micro: 30           # MNQ
  consistency_pct: 0.50             # Max daily profit cap as % of profit_target (safe mode)
  min_trading_days: 2
  allow_t1_news_trading: true

  # Trading-day semantics (defaults match common futures boundaries)
  timezone: "America/New_York"
  trading_day_start_time: "18:00"   # Futures "trade day" rolls at 6pm ET
  eod_lock_time: "16:10"            # Matches your flat-by rule; used to lock trailing DD

  # Enforcement toggles
  enforce_consistency_cap: true
  enforce_drawdown_risk_cap: true
  drawdown_safety_buffer: 0.0       # Keep this $ buffer unused (optional)

  # Legacy assumptions (still used for MNQ-native signal PnL math)
  mnq_tick_value: 2.0               # $2 per point for MNQ
  nq_tick_value: 20.0               # $20 per point for NQ
  contract_size_multiplier: 1.0     # Native MNQ sizing (no NQ scaling)

# =============================================================================
# CLAUDE MONITOR (AI-Powered Monitoring & Assistance)
# =============================================================================
# Claude-powered monitoring service for intelligent alerts and suggestions.
# Requires ANTHROPIC_API_KEY in .env and [llm] extra installed.
claude_monitor:
  enabled: true                        # Master toggle for Claude monitoring
  timezone: "America/New_York"         # Timezone for reports/quiet-hours (default: ET)
  
  # Analysis intervals (seconds)
  realtime_monitoring: true            # Enable real-time monitoring (every minute)
  realtime_interval_seconds: 60        # Real-time check interval
  frequent_interval_seconds: 900       # Frequent analysis interval (15 minutes)
  code_analysis_interval_hours: 1      # How often to run code analysis
  
  # Daily reports
  daily_report_enabled: true           # Send daily performance report
  daily_report_time: "09:00"           # Time to send (ET)
  
  # Weekly reports
  weekly_report_enabled: true          # Send weekly strategic report
  weekly_report_day: "monday"          # Day to send
  weekly_report_time: "09:00"          # Time to send (ET)
  
  # Alert configuration
  alert_levels:                        # Which alert levels to send
    - critical
    - warning
    - info
  dedup_window_seconds: 900            # Deduplication window (15 minutes)
  max_alerts_per_hour: 20              # Rate limit for alerts
  
  # Quiet hours (suppress non-critical alerts)
  quiet_hours_start: "22:00"           # Start of quiet hours (ET)
  quiet_hours_end: "07:00"             # End of quiet hours (ET)
  suppress_info_during_quiet: true     # Suppress INFO alerts during quiet hours
  
  # Suggestions
  max_suggestions_per_analysis: 5      # Maximum suggestions per analysis cycle
  auto_apply_enabled: false            # Require manual approval by default
  max_auto_changes_per_day: 3          # Maximum auto-applied changes per day
  
  # Analysis lookback periods
  signal_analysis_lookback_hours: 24   # Signal analysis window
  system_analysis_lookback_hours: 48   # System health window
  market_analysis_lookback_hours: 168  # Market analysis window (1 week)
  
  # Claude API settings (can also be set via env vars)
  # model: "claude-sonnet-4-20250514"  # Default model
  # max_tokens: 8000                   # Max response tokens
  # timeout: 180                       # Request timeout (seconds)
