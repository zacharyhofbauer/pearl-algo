# NQ Trading Agent Configuration
# Simple configuration for NQ futures trading with IBKR and Telegram

# Trading Symbol
symbol: "NQ"  # E-mini NASDAQ-100 futures

# Timeframe
timeframe: "1m"  # 1-minute bars for intraday trading

# Scan Interval (seconds)
scan_interval: 60  # Check for signals every 60 seconds

# IBKR Connection
ibkr:
  host: "${IBKR_HOST:-127.0.0.1}"
  port: "${IBKR_PORT:-4002}"
  client_id: "${IBKR_CLIENT_ID:-10}"
  data_client_id: "${IBKR_DATA_CLIENT_ID:-11}"

# Telegram Notifications
telegram:
  enabled: true
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"
  notify_on:
    - "signal"
    - "entry"
    - "exit"
    - "error"

# Risk Management
risk:
  max_risk_per_trade: 0.02  # 2% max risk per trade
  max_drawdown: 0.15  # 15% account drawdown limit
  stop_loss_atr_multiplier: 2.0
  take_profit_risk_reward: 2.0  # 2:1 R/R ratio

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/nq_agent.log"
  console: true

# Data Provider
data_provider: "ibkr"  # Use IBKR for market data
