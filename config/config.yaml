symbol: MNQ
timeframe: 1m
scan_interval: 30
session:
  start_time: '18:00'
  end_time: '16:10'
telegram:
  enabled: true
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
telegram_ui:
  compact_metrics_enabled: true
  show_progress_bars: false
  show_volume_metrics: true
  compact_metric_width: 10
risk:
  max_risk_per_trade: 0.01
  max_drawdown: 0.1
  stop_loss_atr_multiplier: 3.0
  take_profit_risk_reward: 2.0
  min_position_size: 5
  max_position_size: 50
  signal_type_size_multipliers:
    sr_bounce: 0.25
  signal_type_max_contracts:
    sr_bounce: 2
service:
  status_update_interval: 3600
  heartbeat_interval: 86400
  state_save_interval: 10
  connection_failure_alert_interval: 600
  data_quality_alert_interval: 300
  dashboard_chart_enabled: true
  dashboard_chart_interval: 3600
  dashboard_chart_timeframe: 5m
  dashboard_chart_lookback_hours: 12
  enable_new_bar_gating: true
  adaptive_cadence_enabled: true
  scan_interval_active_seconds: 5
  scan_interval_idle_seconds: 30
  scan_interval_market_closed_seconds: 300
  scan_interval_paused_seconds: 60
  scan_interval_velocity_seconds: 1.5
  velocity_mode_enabled: true
  velocity_atr_expansion_threshold: 1.2
  velocity_volume_spike_threshold: 2.0
circuit_breaker:
  max_consecutive_errors: 10
  max_connection_failures: 10
  max_data_fetch_errors: 5
data:
  buffer_size: 100
  buffer_size_5m: 300
  buffer_size_15m: 100
  historical_hours: 2
  multitimeframe_5m_hours: 25
  multitimeframe_15m_hours: 25
  performance_history_limit: 1000
  stale_data_threshold_minutes: 10
  connection_timeout_minutes: 30
  enable_base_cache: true
  base_refresh_seconds: 60
  enable_mtf_cache: true
  mtf_refresh_seconds_5m: 300
  mtf_refresh_seconds_15m: 900
storage:
  sqlite_enabled: true
  db_path: data/nq_agent_state/trades.db
  async_writes_enabled: true
  async_queue_max_size: 1000
  async_queue_priority_trades: true
challenge:
  enabled: true
  start_balance: 50000.0
  max_drawdown: 2000.0
  profit_target: 3000.0
  auto_reset_on_pass: true
  auto_reset_on_fail: true
signals:
  duplicate_window_seconds: 120
  min_confidence: 0.55
  min_risk_reward: 1.3
  duplicate_price_threshold_pct: 0.5
  volatility_threshold: 0.0001
  avoid_lunch_lull: false
  skip_overnight: true
  quality_score:
    enabled: true
    threshold: 0.35
    factors:
      confidence_weight: 0.3
      risk_reward_weight: 0.25
      regime_alignment_weight: 0.2
      volume_profile_weight: 0.15
      mtf_alignment_weight: 0.1
  prioritize_ny_session: false
  min_volume: 10
  explore:
    enabled: false
    min_confidence: 0.75
    min_risk_reward: 2.0
    include_quality_rejects: false
    bypass_regime_filters: false
  max_stop_points: 45.0
  adaptive_volatility_filter:
    enabled: false
    expansion_requirement: 2.0
    median_atr_threshold: 0.0003
  regime_filters:
    mean_reversion_long:
      allowed_regimes:
      - ranging
      - trending_bullish
      - trending_bearish
    mean_reversion_short:
      allowed_regimes:
      - ranging
      - trending_bearish
      - trending_bullish
    momentum_long:
      allowed_regimes:
      - ranging
      - trending_bullish
      - trending_bearish
    unified_strategy:
      allowed_regimes:
      - trending_bullish
      - trending_bearish
      allowed_sessions:
      - afternoon
strategy:
  enabled_signals:
  - unified_strategy
  enable_dynamic_sizing: true
  base_contracts: 3
  high_conf_contracts: 5
  max_conf_contracts: 8
  high_conf_threshold: 0.8
  max_conf_threshold: 0.9
  winning_signal_types:
  - unified_strategy
  signal_type_size_multipliers:
    unified_strategy: 1.0
  use_scalp_presets: false
  scalp_target_points: 20.0
  scalp_stop_points: 12.0
  session_position_scaling:
    enabled: true
    london_multiplier: 0.8
    tokyo_multiplier: 0.7
    ny_multiplier: 1.5
performance:
  max_records: 1000
  default_lookback_days: 7
virtual_pnl:
  enabled: true
  intrabar_tiebreak: take_profit
  notify_entry: true
  notify_exit: true
hud:
  enabled: true
  show_rr_box: true
  rr_box_forward_bars: 30
  right_pad_bars: 30
  show_sessions: true
  show_session_names: true
  show_session_oc: true
  show_session_tick_range: true
  show_session_average: true
  show_supply_demand: true
  show_power_channel: true
  show_tbt_targets: true
  show_key_levels: true
  show_right_labels: true
  max_right_labels: 12
  right_label_merge_ticks: 4
  show_rsi: true
  rsi_period: 14
sessions:
- name: Tokyo
  session: 0000-0900
  timezone: UTC
  color: '#2962FF'
- name: London
  session: 0800-1600
  timezone: UTC
  color: '#FF9800'
- name: New York
  session: 1400-2100
  timezone: UTC
  color: '#089981'
indicators:
  enabled:
  - smart_money_divergence
  as_signals: false
  as_features: true
  supply_demand_zones:
    lookback: 50
    min_zone_size_atr: 0.5
    max_zones: 5
    zone_threshold_pct: 0.3
  power_channel:
    length: 130
    atr_mult: 2.0
  smart_money_divergence:
    lookback: 14
    pivot_lookback: 5
    rsi_period: 14
llm_signal_annotation:
  enabled: false
  model: claude-sonnet-4-20250514
  timeout_seconds: 5
  batch_mode: false
llm_trade_postmortem:
  enabled: false
  model: claude-sonnet-4-20250514
  timeout_seconds: 10
  min_pnl_threshold: 500
  send_to_telegram: true
  batch_analysis_count: 5
llm_pattern_recognition:
  enabled: false
  model: claude-sonnet-4-20250514
  timeout_seconds: 30
  batch_size: 5
  lookback_trades: 50
  min_pattern_confidence: 0.6
  send_to_telegram: true
llm_risk_assessment:
  enabled: false
  model: claude-sonnet-4-20250514
  timeout_seconds: 3
  block_on_critical: false
  consider_recent_trades: 20
llm_adaptive_tuning:
  enabled: false
  model: claude-sonnet-4-20250514
  timeout_seconds: 60
  analysis_interval_hours: 24
  auto_apply: false
  min_sample_size: 20
  conservative_mode: true
execution:
  enabled: false
  armed: false
  mode: dry_run
  adapter: ibkr
  max_positions: 1
  max_orders_per_day: 20
  max_daily_loss: 500.0
  cooldown_seconds: 60
  symbol_whitelist:
  - MNQ
  ibkr_trading_client_id: 20
  ibkr_host: ${IBKR_HOST}
  ibkr_port: ${IBKR_PORT}
learning:
  enabled: true
  mode: shadow
  feature_engineer_enabled: true
  features:
    short_window: 5
    medium_window: 20
    long_window: 50
    compute_price_action: true
    compute_volume_profile: true
    compute_microstructure: true
    compute_time_features: true
    compute_sequential: true
    compute_cross_timeframe: true
    normalize_features: true
    clip_outliers: true
    outlier_std: 3.0
  min_samples_per_type: 10
  explore_rate: 0.1
  decision_threshold: 0.3
  max_size_multiplier: 1.5
  min_size_multiplier: 0.5
  prior_alpha: 2.0
  prior_beta: 2.0
  decay_factor: 0.0
  contextual:
    enabled: true
    mode: shadow
    explore_rate: 0.1
    min_samples_per_context: 5
    decision_threshold: 0.3
    fallback_to_global: true
adaptive_stops:
  enabled: true
  use_structure_stops: true
  use_level2_zones: true
  min_stop_points: 12.0
  anti_hunt_jitter: true
  jitter_range_points: 3.0
  regime_multipliers:
    ranging: 1.2
    trending_bullish: 1.3
    trending_bearish: 1.3
  session_multipliers:
    tokyo: 1.0
    london: 1.1
    new_york: 1.2
  volatility_multipliers:
    low: 1.0
    normal: 1.0
    high: 1.5
  performance_adjustment: true
swing_trading:
  enabled: true
  min_confidence: 0.75
  min_target_points: 50
  min_mtf_alignment: 0.8
  min_volume_ratio: 1.2
  max_hold_hours: 24
  position_size_multiplier: 2.5
trailing_stop:
  enabled: true
  breakeven_immediate: false
  trail_method: dynamic
  early_profit_trail_atr: 0.5
  medium_profit_trail_atr: 1.0
  large_profit_trail_atr: 2.0
  update_frequency_bars: 1
  never_widen: true
  min_profit_before_be: 18.0
adaptive_sizing:
  enabled: true
  method: kelly_criterion
  kelly_fraction: 0.25
  min_contracts: 1
  max_contracts: 15
  confidence_scaling: true
  regime_scaling: true
  session_scaling: true
  streak_adjustment: true
  losing_streak_threshold: 3
  max_losing_streak_reduction: 0.5
  winning_streak_threshold: 3
  winning_streak_boost: 1.2
ml_filter:
  enabled: true
  mode: shadow
  require_lift_to_block: true
  lift_lookback_trades: 200
  lift_min_trades: 50
  lift_min_winrate_delta: 0.05
  model_path: models/signal_filter_v1.joblib
  model_version: v1.0.0
  min_probability: 0.55
  high_probability: 0.7
  min_training_samples: 30
  retrain_interval_days: 7
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  calibrate_probabilities: true
drift_guard:
  enabled: false
  lookback_trades: 20
  min_trades: 10
  win_rate_floor: 0.2
  volatility_spike_enabled: false
  volatility_levels:
  - extreme
  require_atr_expansion: true
  cooldown_minutes: 10
  tighten_min_confidence_delta: 0.0
  tighten_min_risk_reward_delta: 0.0
  size_multiplier: 1.0
prop_firm:
  enabled: false
  profile: mff_core_50k_eval
  account_size: 50000
  profit_target: 3000
  max_loss_limit_eod: 2000
  daily_loss_limit: null
  max_contracts_mini: 3
  max_contracts_micro: 30
  consistency_pct: 0.5
  min_trading_days: 2
  allow_t1_news_trading: true
  timezone: America/New_York
  trading_day_start_time: '18:00'
  eod_lock_time: '16:10'
  enforce_consistency_cap: true
  enforce_drawdown_risk_cap: true
  drawdown_safety_buffer: 0.0
  mnq_tick_value: 2.0
  nq_tick_value: 20.0
  contract_size_multiplier: 1.0
claude_monitor:
  enabled: true
  timezone: America/New_York
  realtime_monitoring: false
  realtime_interval_seconds: 60
  frequent_interval_seconds: 3600
  code_analysis_interval_hours: 48
  code_analysis_enabled: false
  daily_report_enabled: true
  daily_report_time: 09:00
  weekly_report_enabled: true
  weekly_report_day: monday
  weekly_report_time: 09:00
  alert_levels:
  - critical
  alert_categories:
  - signals
  include_alert_metadata: false
  dedup_window_seconds: 3600
  max_alerts_per_hour: 6
  quiet_hours_start: '22:00'
  quiet_hours_end: 07:00
  suppress_info_during_quiet: true
  max_suggestions_per_analysis: 3
  auto_apply_enabled: false
  max_auto_changes_per_day: 0
  auto_apply_backtest_enabled: true
  auto_apply_backtest_data_path: data/historical/MNQ_1m_2w.parquet
  auto_apply_backtest_lookback_weeks: 1
  auto_apply_backtest_decision: 1m
  auto_apply_backtest_timeout_seconds: 45
  auto_apply_backtest_max_bars: 200
  auto_apply_backtest_max_signal_drop_pct: 0.05
  auto_apply_backtest_min_baseline_signals: 20
  auto_apply_backtest_min_type_baseline_signals: 10
  auto_apply_backtest_fail_on_type_zeroed: true
  auto_apply_backtest_defer_minutes: 360
  strategy_update_prompts_enabled: true
  strategy_update_prompt_cooldown_seconds: 1800
  strategy_update_min_regime_confidence: 0.55
  signal_analysis_lookback_hours: 24
  system_analysis_lookback_hours: 48
  market_analysis_lookback_hours: 168
