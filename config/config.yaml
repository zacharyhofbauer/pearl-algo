# MNQ Trading Agent Configuration
# Prop firm style trading configuration for Mini NQ (MNQ) futures
# Optimized for intraday swings and quick scalps

# Trading Symbol
symbol: "MNQ"  # Mini NQ (1/10th size of NQ, prop-firm friendly)

# Timeframe
timeframe: "1m"  # 1-minute bars for decision stream (more opportunities), 5m/15m for MTF context

# Scan Interval (seconds) - base interval when adaptive_cadence_enabled is false
# When adaptive_cadence_enabled: true (default), this is overridden by the active/idle/closed intervals below
scan_interval: 30  # Base scan interval (overridden by adaptive cadence when enabled)

# Strategy session window (NY time / ET).
# This controls when the strategy is allowed to generate signals.
# Your prop-firm rule: positions must be flat by 16:10 ET, so we stop signals at 16:10.
session:
  start_time: "18:00"  # Session opens at 6:00 PM ET (Sunday 18:00 aligns with CME ETH reopen)
  end_time: "16:10"    # Session closes at 4:10 PM ET (before CME 17:00 close)

# Telegram Notifications
telegram:
  enabled: true
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

# Telegram Home Card / Dashboard UI (compact, mobile-first)
telegram_ui:
  compact_metrics_enabled: true   # Master toggle for compact metric formatting
  show_progress_bars: false       # Show unicode progress bars for ratios (buffer, WR, quality)
  show_volume_metrics: true       # Include vol ratio / Δ / pressure badge in activity line
  compact_metric_width: 10        # Progress bar width (recommend 8-12)

# Risk Management (Prop Firm Style)
risk:
  max_risk_per_trade: 0.01  # 1% max risk per trade (prop firm conservative)
  max_drawdown: 0.10        # 10% account drawdown limit (prop firm typical)
  stop_loss_atr_multiplier: 1.5  # Tighter stops for scalping
  take_profit_risk_reward: 1.5   # Target R:R for TP calculation (filter uses signals.min_risk_reward)
  min_position_size: 5      # Minimum MNQ contracts per trade
  max_position_size: 15     # Maximum MNQ contracts per trade

# Service intervals
service:
  status_update_interval: 3600  # 1 hour (aligned with chart interval for combined notifications)
  heartbeat_interval: 86400     # Disabled (1 day) - dashboard replaces heartbeat
  state_save_interval: 10       # Save state every N cycles
  connection_failure_alert_interval: 600  # 10 minutes in seconds
  data_quality_alert_interval: 300        # 5 minutes in seconds
  dashboard_chart_enabled: true           # Enable dashboard chart notifications
  dashboard_chart_interval: 3600          # 1 hour (matches status_update_interval)
  dashboard_chart_timeframe: "5m"         # 5-minute candles for clean, readable chart
  dashboard_chart_lookback_hours: 12       # 12 hours of price action (144 candles at 5m)
  
  # Performance optimization: skip heavy analysis when bar hasn't advanced.
  # High leverage for 5m bars + 30s scan interval (5 of 6 cycles are repeats).
  enable_new_bar_gating: true   # Skip strategy.analyze() if df hasn't advanced (default ON)
  
  # Adaptive cadence: dynamically adjust scan interval based on market/session state.
  # Profile: fast_active (5s active, 30s idle, 300s closed, 60s paused)
  # VELOCITY MODE: Sub-second scans when ATR expands or volume spikes (catch fast moves)
  adaptive_cadence_enabled: true          # Master toggle for adaptive cadence
  scan_interval_active_seconds: 5         # When strategy_session_open (active trading)
  scan_interval_idle_seconds: 30          # When futures open but strategy session closed
  scan_interval_market_closed_seconds: 300  # When futures market closed (weekends, maintenance)
  scan_interval_paused_seconds: 60        # When service is paused
  
  # Velocity mode: ultra-fast scans when market is moving (breakouts, ATR expansion, volume spikes)
  scan_interval_velocity_seconds: 1.5     # When velocity conditions met (1-2s for fast moves)
  velocity_mode_enabled: true             # Master toggle for velocity mode
  velocity_atr_expansion_threshold: 1.20  # ATR increase ratio to trigger velocity (20% = expansion day)
  velocity_volume_spike_threshold: 2.0    # Volume multiple vs recent avg to trigger velocity (2x = spike)

# Circuit breaker
circuit_breaker:
  max_consecutive_errors: 10
  max_connection_failures: 10
  max_data_fetch_errors: 5

# Data fetching
data:
  buffer_size: 100                 # Main buffer (1m bars)
  buffer_size_5m: 300              # 5m timeframe buffer (300 bars = 25h for 24h chart display)
  buffer_size_15m: 100             # 15m timeframe buffer (100 bars = 25h)
  historical_hours: 2              # Historical data fetch window
  multitimeframe_5m_hours: 25      # 5m MTF window (25h to support 24h dashboard chart)
  multitimeframe_15m_hours: 25     # 15m MTF window (25h)
  performance_history_limit: 1000  # Max performance records
  stale_data_threshold_minutes: 10 # Alert if data is older than this
  connection_timeout_minutes: 30   # Consider connection lost after this time without data
  
  # Caching options (reduce IBKR request volume)
  # When enabled, historical data is refreshed on a TTL rather than every scan cycle.
  # Level 1 real-time data (latest_bar) is still fetched every cycle for freshness.
  enable_base_cache: true          # Cache base timeframe historical data (reduces IBKR load)
  base_refresh_seconds: 60         # TTL for base historical cache (seconds)
  enable_mtf_cache: true           # Cache 5m/15m MTF historical data (reduces IBKR load)
  mtf_refresh_seconds_5m: 300      # TTL for 5m MTF cache (5 minutes)
  mtf_refresh_seconds_15m: 900     # TTL for 15m MTF cache (15 minutes)

# =============================================================================
# STORAGE (Platform State / "Never forget any lesson")
# =============================================================================
# We keep JSON/JSONL files for backward compatibility with Telegram + existing tooling,
# but also dual-write into SQLite for queryable history + reproducibility.
storage:
  sqlite_enabled: true
  # Default path is inside the state directory. If unset, code will use: data/nq_agent_state/trades.db
  db_path: "data/nq_agent_state/trades.db"
  
  # Async writes (performance): move SQLite writes to background thread to avoid blocking main loop
  async_writes_enabled: true              # Enable async/non-blocking SQLite writes
  async_queue_max_size: 1000              # Max queued writes (older observability writes drop if full)
  async_queue_priority_trades: true       # Always keep trade exits (drop cycle_diagnostics first)

# =============================================================================
# 50K CHALLENGE TRACKER (Pass/Fail Rules)
# =============================================================================
# Tracks account attempts with pass/fail thresholds.
# - PnL shown in Telegram = current attempt only (not all-time)
# - Historical trades are NEVER deleted (just tracked separately per attempt)
challenge:
  enabled: true
  start_balance: 50000.0                  # Starting balance for each attempt
  max_drawdown: 2000.0                    # Hit -$2,000 = FAIL (auto-reset)
  profit_target: 3000.0                   # Hit +$3,000 = PASS (auto-reset)
  auto_reset_on_pass: true                # Automatically start new attempt on PASS
  auto_reset_on_fail: true                # Automatically start new attempt on FAIL

# Signal generation
# QUALITY-FOCUSED: Purely quality-driven, NO CAPS (2025-01-07)
# - Only top 10-15% of signals pass quality filters
# - Take ALL signals that pass, regardless of count (0, 5, or 100+ per day)
# - Natural frequency based on market conditions
signals:
  duplicate_window_seconds: 180      # 3 minutes (more opportunities; still deduped)
  min_confidence: 0.75               # QUALITY: Raised to 0.75 (top 25% of signals)
  min_risk_reward: 2.0               # QUALITY: Raised to 2.0 (only best setups)
  duplicate_price_threshold_pct: 0.5 # 0.5% price difference for duplicate detection
  volatility_threshold: 0.00025      # Tuned: reduce low-volatility gating further (Tokyo/London opportunities)
  avoid_lunch_lull: false            # Disabled - was blocking 72 signals
  
  # Quality score composite filter (combines multiple factors)
  # Only top 10-15% of signals pass this filter
  # NO LIMIT on how many pass - if 50 signals score >0.85, take all 50
  quality_score:
    enabled: true                    # Enable composite quality scoring
    threshold: 0.85                  # Minimum composite quality score (0-1)
    factors:
      confidence_weight: 0.30        # Signal confidence (30% of score)
      risk_reward_weight: 0.25        # Risk:reward ratio (25% of score)
      regime_alignment_weight: 0.20  # Regime favorability (20% of score)
      volume_profile_weight: 0.15    # Volume profile confirmation (15% of score)
      mtf_alignment_weight: 0.10     # Multi-timeframe alignment (10% of score)
  
  # Time-of-day quality filter
  # Prioritize NY session for best liquidity, but allow all sessions
  prioritize_ny_session: true         # Higher quality bar for overnight sessions
  
  # Volume gate (minimum volume per bar to consider for signals)
  # Referenced to 5m bars, scales for other timeframes (1m = 0.2x, 15m = 3x).
  # Set lower for 24h futures trading (Tokyo/London have lower volume than NY).
  # 100 for 5m → 20 for 1m bars, which passes most live bars (observed: 300-700).
  min_volume: 100

  # Opportunity tiers (A-tier actionable vs B-tier explore)
  # DISABLED: Focus on quality A-tier only
  explore:
    enabled: false                  # Disabled - focus on quality A-tier only
    min_confidence: 0.75            # If re-enabled: match main quality threshold
    min_risk_reward: 2.0            # If re-enabled: match main quality threshold
    include_quality_rejects: false  # Disabled - no near-misses
    bypass_regime_filters: false    # Disabled - enforce all filters
    # NOTE: max_signals_per_hour removed - NO CAPS
  
  # Stop-distance cap (risk control)
  # Keep at 20 pts - working well in A/B tests
  # 20 pts = $120 risk @ 3 MNQ contracts (base_contracts during emergency)
  max_stop_points: 20.0              # Reduced from 25.0
  
  # Adaptive volatility filter (LANE B - strategy threshold change)
  # DISABLED: A/B testing showed this filter HURTS 1m timeframe performance
  # - Was blocking 7,900+ signals (90%+ rejection rate)
  # - Disabling improved WR from 35% to 44%
  # - Filter was designed for 5m bars, not 1m
  adaptive_volatility_filter:
    enabled: false                    # DISABLED: Hurting 1m performance (2025-01-07 A/B test)
    expansion_requirement: 2.0        # If re-enabled: use 2.0 (2.5 was too strict for 1m)
    median_atr_threshold: 0.0003      # Threshold below which expansion is required
  
  # Per-signal-type regime/session filters
  # Signals are rejected if current regime/session is NOT in the allowed list.
  # OPTIMIZED: Removed NY-only restriction - overnight sessions were winning
  regime_filters:
    mean_reversion_long:
      allowed_regimes: [ranging, trending_bullish]  # Avoid in trending_bearish
      # WORKING: 47% WR - allow in favorable regimes
    mean_reversion_short:
      allowed_regimes: [ranging, trending_bearish]  # Only in favorable conditions
      # OPTIMIZED: Removed NY-only restriction - all sessions allowed
    # sr_bounce_short: DISABLED
    # momentum_short: DISABLED

# Strategy configuration (signal types, position sizing, A/B testing)
# EMERGENCY: Only mean_reversion working - disable all broken signals (2025-01-06)
strategy:
  # Signal types to enable - EMERGENCY: Only mean_reversion working!
  # Data: mean_reversion_long 47% WR (+$1,983), mean_reversion_short 33% WR
  enabled_signals:
    - mean_reversion_long   # ONLY WORKING: 47% WR, +$1,983
    - mean_reversion_short  # Keep but stricter filtering
  
  # Signal types to disable - EMERGENCY DISABLED (0% or poor WR)
  disabled_signals:
    - sr_bounce            # Generic sr_bounce
    - sr_bounce_short      # 0% WR (0/8) = -$2,314 BROKEN
    - sr_bounce_long       # 33% WR (2/6) = -$543 POOR
    - momentum_short       # 0% WR (0/2) = -$482 BROKEN
    - momentum_long        # Already disabled - broken
    - breakout_long        # Disabled - unproven
    - breakout_short       # Disabled - unproven
    - vwap_reversion       # Disabled - unproven
    - engulfing_short      # Already disabled - broken
    - engulfing_long       # Already disabled - untested
  
  # Dynamic position sizing for $200+ scalp targets
  # EMERGENCY: Reduced sizes 40% during recovery period (2025-01-06)
  enable_dynamic_sizing: true
  base_contracts: 3          # EMERGENCY: Reduced from 5 (40% reduction)
  high_conf_contracts: 8     # EMERGENCY: Reduced from 15
  max_conf_contracts: 12     # EMERGENCY: Reduced from 25
  high_conf_threshold: 0.80
  max_conf_threshold: 0.90
  
  # Winning signal types (get max contracts when high confidence)
  # EMERGENCY: Only mean_reversion_long is winning (47% WR)
  winning_signal_types:
    - mean_reversion_long    # Only proven winner
  
  # Scalp presets (optional - override ATR-based stops/targets)
  use_scalp_presets: false
  scalp_target_points: 20.0   # For $200 with 5 contracts
  scalp_stop_points: 12.0
  
  # Session-based position scaling (LANE B - risk parameter change)
  # Reduces position size during quiet sessions (Tokyo, London) to manage risk.
  # Full size during NY session when liquidity and volatility are highest.
  session_position_scaling:
    enabled: true                     # Enabled: 50% size during Tokyo/London, full size NY
    london_multiplier: 0.5            # 50% size during London session
    tokyo_multiplier: 0.5             # 50% size during Tokyo session
    ny_multiplier: 1.0                # Full size during NY session

# Strategy variants for A/B testing
# Use: python scripts/backtesting/run_variants.py --data-path <file>
strategy_variants:
  # =====================================================
  # OPTIMIZATION VARIANTS (2025-01-07 A/B Test)
  # Testing adaptive_volatility_filter impact
  # =====================================================
  
  # Current EMERGENCY settings (baseline for comparison)
  emergency_baseline:
    description: "Current EMERGENCY settings - strict filters"
    min_confidence: 0.65
    min_risk_reward: 1.5
    max_stop_points: 20
    adaptive_volatility_filter_enabled: true
    adaptive_volatility_expansion_requirement: 2.5
  
  # Relaxed settings - test if blocking too many good signals
  relaxed:
    description: "Relaxed filters - more signals, possibly lower quality"
    min_confidence: 0.55
    min_risk_reward: 1.3
    max_stop_points: 25
    adaptive_volatility_filter_enabled: true
    adaptive_volatility_expansion_requirement: 1.5
  
  # Moderate settings - balance between quality and frequency
  moderate:
    description: "Moderate filters - balanced approach"
    min_confidence: 0.60
    min_risk_reward: 1.4
    max_stop_points: 22
    adaptive_volatility_filter_enabled: true
    adaptive_volatility_expansion_requirement: 2.0
  
  # No adaptive volatility filter - test if this filter is helping
  no_avf:
    description: "Adaptive volatility filter DISABLED - test filter value"
    min_confidence: 0.60
    min_risk_reward: 1.4
    max_stop_points: 22
    adaptive_volatility_filter_enabled: false
  
  # =====================================================
  # LEGACY VARIANTS (original presets)
  # =====================================================
  
  aggressive_scalp:
    description: "Aggressive scalping - winners only, tight targets"
    enabled_signals: [sr_bounce, mean_reversion]
    disabled_signals: [momentum_long, engulfing, breakout]
    min_risk_reward: 1.0
    target_points: 20
    max_stop_points: 15
    base_contracts: 10
  
  conservative:
    description: "Conservative - high confidence only"
    enabled_signals: [sr_bounce, mean_reversion_long, momentum_short]
    disabled_signals: [momentum_long, engulfing, breakout]
    min_risk_reward: 1.5
    min_confidence: 0.75
  
  high_volume:
    description: "High volume scalping - 25 contracts on best setups"
    enabled_signals: [sr_bounce, mean_reversion]
    disabled_signals: [momentum_long, engulfing]
    base_contracts: 15
    high_conf_contracts: 20
    max_conf_contracts: 25
    target_points: 10
    max_stop_points: 8

# Performance tracking
performance:
  max_records: 1000
  default_lookback_days: 7

# Virtual PnL tracking (signal grading without real IBKR fills)
virtual_pnl:
  enabled: true                       # Enable virtual TP/SL tracking for signal quality grading
  intrabar_tiebreak: "stop_loss"      # When TP and SL both touched in same bar: "stop_loss" (conservative) or "take_profit"
  notify_entry: true                  # Send Telegram entry notification when a virtual trade is opened
  notify_exit: true                   # Send Telegram exit notification when TP/SL is touched

# Chart HUD (TradingView-style overlays)
hud:
  enabled: true                       # Master toggle for all HUD elements
  show_rr_box: true                   # Risk/reward box (green TP zone, red SL zone)
  rr_box_forward_bars: 30             # How far forward to extend RR box
  right_pad_bars: 30                  # Right padding for labels + RR box

  # Sessions (Tokyo/London/NY shading)
  show_sessions: true
  show_session_names: true
  show_session_oc: true               # Session open/close lines
  show_session_tick_range: true
  show_session_average: true

  # Zones and channels
  show_supply_demand: true            # LuxAlgo-style supply/demand zones
  show_power_channel: true            # ChartPrime-style power channel
  show_tbt_targets: true              # Trendline breakout targets

  # Key levels (PDH/PDL/VWAP/POC)
  show_key_levels: true
  show_right_labels: true             # TradingView-style right-side labels
  max_right_labels: 12
  right_label_merge_ticks: 4          # Merge labels within N ticks

  # RSI panel
  show_rsi: true
  rsi_period: 14

# Session definitions (for chart HUD shading)
# Using Key Levels SpacemanBTC Pine defaults (UTC-based sessions)
sessions:
  - name: "Tokyo"
    session: "0000-0900"
    timezone: "UTC"
    color: "#2962FF"
  - name: "London"
    session: "0800-1600"
    timezone: "UTC"
    color: "#FF9800"
  - name: "New York"
    session: "1400-2100"
    timezone: "UTC"
    color: "#089981"

# =============================================================================
# CUSTOM INDICATORS (Supply/Demand, Power Channel, Divergences)
# =============================================================================
# Ported from PineScript. Provide both rule-based signals and ML features.
indicators:
  enabled:
    - supply_demand_zones
    - power_channel
    - smart_money_divergence
  
  as_signals: true        # Generate rule-based signals from indicators
  as_features: true       # Extract numeric features for learning system
  
  # Per-indicator configuration (optional)
  supply_demand_zones:
    lookback: 50          # Bars to analyze for zone detection
    min_zone_size_atr: 0.5
    max_zones: 5
    zone_threshold_pct: 0.3
  
  power_channel:
    length: 130           # Lookback for channel calculation
    atr_mult: 2.0         # ATR multiplier for channel width
  
  smart_money_divergence:
    lookback: 14
    pivot_lookback: 5
    rsi_period: 14

# =============================================================================
# LLM SIGNAL ANNOTATION (AI-Powered Signal Analysis)
# =============================================================================
# Uses Claude to analyze signals and generate human-readable explanations.
# Non-blocking with timeout - failures don't affect signal processing.
llm_signal_annotation:
  enabled: true                    # Master toggle for AI signal analysis
  model: "claude-sonnet-4-20250514"  # Claude model to use
  timeout_seconds: 5              # Max time to wait for annotation (keep signals fast)
  batch_mode: false               # Process signals individually (batching not yet implemented)

# =============================================================================
# LLM TRADE POST-MORTEM (AI-Powered Trade Analysis)
# =============================================================================
# Analyzes completed trades to identify lessons and improvements.
# EMERGENCY: Enabled Telegram + bigger loss threshold for faster feedback
llm_trade_postmortem:
  enabled: true                    # Master toggle for trade post-mortem analysis
  model: "claude-sonnet-4-20250514"  # Claude model to use
  timeout_seconds: 10             # Longer timeout (not time-critical)
  min_pnl_threshold: 100          # EMERGENCY: Raised - analyze bigger losses ($100+)
  send_to_telegram: true          # EMERGENCY: Send to Telegram for immediate review
  batch_analysis_count: 5         # EMERGENCY: Reduced from 10 for faster feedback

# =============================================================================
# LLM PATTERN RECOGNITION (AI-Powered Pattern Detection)
# =============================================================================
# Identifies recurring patterns across trades for optimization insights.
# EMERGENCY: Faster batch analysis for quicker insights
llm_pattern_recognition:
  enabled: true                    # Master toggle for pattern recognition
  model: "claude-sonnet-4-20250514"  # Claude model to use
  timeout_seconds: 30             # Longer timeout (batch analysis)
  batch_size: 5                   # EMERGENCY: Reduced from 10 - faster feedback
  lookback_trades: 50             # Consider last 50 trades
  min_pattern_confidence: 0.6     # EMERGENCY: Lowered from 0.7 - catch more patterns
  send_to_telegram: true          # Valuable insights worth sending

# =============================================================================
# LLM RISK ASSESSMENT (Real-Time Pre-Trade Risk Check)
# =============================================================================
# Quick risk check before signal execution. Must be FAST (<3s).
# EMERGENCY: Enabled due to critical performance issues (31% WR, -$2,118 P&L)
llm_risk_assessment:
  enabled: true                    # ENABLED - emergency intervention
  model: "claude-sonnet-4-20250514"  # Claude model to use
  timeout_seconds: 3              # Must be fast - never delay signals
  block_on_critical: false        # Warning only - don't block trades
  consider_recent_trades: 20      # Last 20 trades for context

# =============================================================================
# LLM ADAPTIVE TUNING (AI-Powered Config Optimization)
# =============================================================================
# Suggests config changes based on performance analysis.
# EMERGENCY: More frequent analysis for faster optimization
llm_adaptive_tuning:
  enabled: true                    # Master toggle for adaptive tuning
  model: "claude-sonnet-4-20250514"  # Claude model to use
  timeout_seconds: 60             # Longer timeout (comprehensive analysis)
  analysis_interval_hours: 12     # EMERGENCY: Twice daily (was 24h)
  auto_apply: false               # Require manual approval
  min_sample_size: 20             # EMERGENCY: Reduced from 30 for faster feedback
  conservative_mode: true         # Small incremental changes only

# =============================================================================
# EXECUTION (ATS - Automated Trading System)
# =============================================================================
# Controls automated order placement via an execution adapter (default: IBKR).
# SAFETY: Default is disabled + disarmed. Must explicitly enable and /arm to trade.
execution:
  enabled: false                    # Master toggle - must be true for any execution
  armed: false                      # Runtime toggle - must be true to place orders (use /arm command)
  mode: "dry_run"                   # "dry_run" (log only), "paper", or "live"
  adapter: "ibkr"                   # "ibkr" | "tradovate" (tradovate is dry_run-only skeleton for now)
  
  # Risk limits (hard caps)
  max_positions: 1                  # Maximum concurrent positions
  max_orders_per_day: 20            # Maximum orders per trading day
  max_daily_loss: 500.0             # Kill switch: max daily loss in dollars
  cooldown_seconds: 60              # Minimum seconds between orders for same signal type
  
  # Symbol whitelist (empty = all symbols allowed)
  symbol_whitelist:
    - MNQ
  
  # IBKR connection (separate client_id from data to avoid conflicts)
  ibkr_trading_client_id: 20        # Different from IBKR_CLIENT_ID (data)
  ibkr_host: "${IBKR_HOST}"
  ibkr_port: "${IBKR_PORT}"

# =============================================================================
# LEARNING (Adaptive Bandit Policy + Feature Engineering)
# =============================================================================
# Adjusts execution decisions based on observed signal type performance.
# Uses Thompson sampling (Beta-Bernoulli) per signal type.
# SAFETY: Default is shadow mode - learns but does NOT affect execution.
learning:
  enabled: true                     # Master toggle for adaptive policy
  mode: "shadow"                    # "shadow" (observe only) or "live" (affects execution)
  
  # Feature engineering for ML integration
  feature_engineer_enabled: true    # Compute 50+ ML features from market data
  features:
    short_window: 5
    medium_window: 20
    long_window: 50
    compute_price_action: true
    compute_volume_profile: true
    compute_microstructure: true
    compute_time_features: true
    compute_sequential: true
    compute_cross_timeframe: true
    normalize_features: true
    clip_outliers: true
    outlier_std: 3.0
  
  # Bandit configuration
  min_samples_per_type: 10          # Minimum samples before policy has opinion
  explore_rate: 0.1                 # Random explore rate (epsilon-greedy component)
  decision_threshold: 0.3           # Skip signal if P(win) < threshold
  
  # Position sizing adjustment (when mode=live)
  max_size_multiplier: 1.5          # Maximum size boost for high-confidence types
  min_size_multiplier: 0.5          # Minimum size reduction for low-confidence types
  
  # Prior distribution (Beta distribution parameters)
  # Start optimistic: alpha=2, beta=2 gives mean=0.5 with some uncertainty
  prior_alpha: 2.0
  prior_beta: 2.0
  
  # Decay factor for older observations (0 = no decay, 1 = full weight to recent)
  decay_factor: 0.0                 # Disabled for now - all observations equal weight

  # Contextual learning (optional): learns performance by session/regime/time bucket.
  # Safe for manual trading: annotates signals + learns from virtual exits.
  contextual:
    enabled: true
    mode: "live"  # CHANGED: Enable live contextual learning
    explore_rate: 0.1
    min_samples_per_context: 5
    decision_threshold: 0.3
    fallback_to_global: true

# =============================================================================
# ADAPTIVE STOPS (v2.0 Risk Management)
# =============================================================================
# Context-aware stop loss and take profit calculation.
# Adapts to regime, session, volatility, and signal type performance.
adaptive_stops:
  enabled: true                      # Master toggle for adaptive stops
  use_structure_stops: true          # Use swing highs/lows for stop placement
  use_level2_zones: true             # Use market depth analysis (approximated from L1)
  min_stop_points: 5.0               # Minimum stop distance in points
  
  # Regime-based multipliers (ATR multiplier adjustments)
  regime_multipliers:
    ranging: 1.0
    trending_bullish: 1.2
    trending_bearish: 1.2
    
  # Session-based multipliers (reduce stops during low-vol sessions)
  session_multipliers:
    tokyo: 0.8
    london: 0.9
    new_york: 1.0
    
  # Volatility-based multipliers
  volatility_multipliers:
    low: 0.9
    normal: 1.0
    high: 1.3
    
  # Performance-based adjustment (wider stops for low-WR signals)
  performance_adjustment: true

# =============================================================================
# SWING TRADING (Bigger Opportunities)
# =============================================================================
# Automatically detect and hold bigger opportunities longer.
# NO LIMIT on swing trades per day - take all quality swing setups.
swing_trading:
  enabled: true                      # Master toggle for swing trade detection
  min_confidence: 0.90               # High confidence required for swing classification
  min_target_points: 30              # Large target (30+ points vs 15-20 for scalps)
  min_mtf_alignment: 0.80            # Strong multi-timeframe alignment required
  min_volume_ratio: 1.2              # Volume spike or above-average volume
  max_hold_hours: 8                  # Until end of day for futures (16:10 ET)
  position_size_multiplier: 1.5      # Can use larger size for swing trades
  # NO limit on swing trades per day - all quality swings are taken

# =============================================================================
# TRAILING STOP LOSS (Profit Protection)
# =============================================================================
# Advanced stop loss management: breakeven protection + dynamic trailing.
trailing_stop:
  enabled: true                      # Master toggle for trailing stops
  breakeven_immediate: true          # Move to BE immediately when any profit is made
  trail_method: "dynamic"            # dynamic | atr_multiplier | percentage
  early_profit_trail_atr: 0.5        # 0-1x ATR profit: trail by 0.5x ATR (tight)
  medium_profit_trail_atr: 1.0       # 1-2x ATR profit: trail by 1.0x ATR (moderate)
  large_profit_trail_atr: 1.5       # 2x+ ATR profit: trail by 1.5x ATR (loose, let it run)
  update_frequency_bars: 1           # Update every bar (1m)
  never_widen: true                  # Only move stop in favorable direction (never widen)
  min_profit_before_be: 2.0          # Minimum profit (points) before moving to breakeven

# =============================================================================
# ADAPTIVE POSITION SIZING (v2.0 Risk Management)
# =============================================================================
# Kelly Criterion + context-aware position sizing.
# Replaces simple confidence-based sizing with mathematically optimal sizing.
adaptive_sizing:
  enabled: true                      # Master toggle for adaptive sizing
  method: "kelly_criterion"          # "kelly_criterion", "fixed", or "hybrid"
  kelly_fraction: 0.25               # Conservative Kelly (1/4 Kelly)
  min_contracts: 1
  max_contracts: 15                  # Reduced from 25 during recovery
  
  # Feature toggles
  confidence_scaling: true           # Scale size based on signal confidence
  regime_scaling: true               # Scale size based on regime favorability
  session_scaling: true              # Reduce size during Tokyo/London
  streak_adjustment: true            # Reduce size on losing streaks
  
  # Streak settings
  losing_streak_threshold: 3         # Start reducing after 3 consecutive losses
  max_losing_streak_reduction: 0.5   # Reduce to 50% after losing streak
  winning_streak_threshold: 3        # Start boosting after 3 wins
  winning_streak_boost: 1.2          # Boost to 120% during win streak

# =============================================================================
# ML SIGNAL FILTER (v2.0 Risk Management)
# =============================================================================
# XGBoost/LightGBM classifier to predict trade success probability.
# Filters out signals with low predicted win probability.
ml_filter:
  enabled: true                      # Master toggle for ML filter
  # SAFE DEFAULT: score-only (shadow) until we prove lift on your own outcomes.
  # Set to "live" to allow blocking (still gated by require_lift_to_block by default).
  mode: "shadow"                     # "shadow" | "live"
  require_lift_to_block: true        # Only allow blocking once lift is demonstrated
  lift_lookback_trades: 200          # Trades used to measure lift (pass vs would-block)
  lift_min_trades: 50                # Minimum graded exits needed before blocking is allowed
  lift_min_winrate_delta: 0.05       # Require +5% absolute WR lift before blocking activates
  model_path: "models/signal_filter_v1.joblib"  # Path to saved model
  model_version: "v1.0.0"
  
  # Prediction thresholds
  min_probability: 0.55              # Minimum P(win) to pass filter
  high_probability: 0.70             # High confidence threshold
  
  # Training settings
  min_training_samples: 30           # Minimum samples to train model
  retrain_interval_days: 7           # Days between automatic retraining
  
  # Model hyperparameters
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  
  # Calibration
  calibrate_probabilities: true

# =============================================================================
# DRIFT GUARD (Risk-Off Cooldown)
# =============================================================================
# Automatically tightens filters + reduces size when:
# - Recent win-rate drops below a floor (over last N graded exits)
# - Volatility shocks (high/extreme volatility + ATR expansion)
drift_guard:
  enabled: true
  lookback_trades: 20
  min_trades: 10
  win_rate_floor: 0.40
  volatility_spike_enabled: true
  volatility_levels: ["high", "extreme"]
  require_atr_expansion: true
  cooldown_minutes: 60
  tighten_min_confidence_delta: 0.05
  tighten_min_risk_reward_delta: 0.20
  size_multiplier: 0.50

# =============================================================================
# PROP FIRM MODE (rule guardrails)
# =============================================================================
# Optional: adds "prop firm guardrails" that can:
# - Cap/adjust execution position size to firm max contracts
# - Prevent execution when near/over max loss limit
# - Enforce a conservative consistency cap (evaluation)
#
# NOTE: These guardrails use the agent's tracked (virtual) PnL unless/until a
# broker equity feed is wired in.
prop_firm:
  enabled: false
  profile: "mff_core_50k_eval"     # MyFundedFutures Core 50K (evaluation)

  # Core 50K parameters
  account_size: 50000
  profit_target: 3000
  max_loss_limit_eod: 2000          # Trailing max loss, locked at EOD
  daily_loss_limit: null            # Core: none
  max_contracts_mini: 3             # NQ
  max_contracts_micro: 30           # MNQ
  consistency_pct: 0.50             # Max daily profit cap as % of profit_target (safe mode)
  min_trading_days: 2
  allow_t1_news_trading: true

  # Trading-day semantics (defaults match common futures boundaries)
  timezone: "America/New_York"
  trading_day_start_time: "18:00"   # Futures "trade day" rolls at 6pm ET
  eod_lock_time: "16:10"            # Matches your flat-by rule; used to lock trailing DD

  # Enforcement toggles
  enforce_consistency_cap: true
  enforce_drawdown_risk_cap: true
  drawdown_safety_buffer: 0.0       # Keep this $ buffer unused (optional)

  # Legacy assumptions (still used for MNQ-native signal PnL math)
  mnq_tick_value: 2.0               # $2 per point for MNQ
  nq_tick_value: 20.0               # $20 per point for NQ
  contract_size_multiplier: 1.0     # Native MNQ sizing (no NQ scaling)

# =============================================================================
# CLAUDE MONITOR (AI-Powered Monitoring & Assistance)
# =============================================================================
# Claude-powered monitoring service for intelligent alerts and suggestions.
# Requires ANTHROPIC_API_KEY in .env and [llm] extra installed.
claude_monitor:
  enabled: true                        # Master toggle for Claude monitoring
  timezone: "America/New_York"         # Timezone for reports/quiet-hours (default: ET)
  
  # Analysis intervals (seconds)
  realtime_monitoring: true            # Enable real-time monitoring (every minute)
  realtime_interval_seconds: 60        # Real-time check interval
  frequent_interval_seconds: 900       # Frequent analysis interval (15 minutes)
  code_analysis_interval_hours: 1      # How often to run code analysis
  
  # Daily reports
  daily_report_enabled: true           # Send daily performance report
  daily_report_time: "09:00"           # Time to send (ET)
  
  # Weekly reports
  weekly_report_enabled: true          # Send weekly strategic report
  weekly_report_day: "monday"          # Day to send
  weekly_report_time: "09:00"          # Time to send (ET)
  
  # Alert configuration
  alert_levels:                        # Which alert levels to send
    - critical
    - warning
    - info
  dedup_window_seconds: 900            # Deduplication window (15 minutes)
  max_alerts_per_hour: 20              # Rate limit for alerts
  
  # Quiet hours (suppress non-critical alerts)
  quiet_hours_start: "22:00"           # Start of quiet hours (ET)
  quiet_hours_end: "07:00"             # End of quiet hours (ET)
  suppress_info_during_quiet: true     # Suppress INFO alerts during quiet hours
  
  # Suggestions
  max_suggestions_per_analysis: 5      # Maximum suggestions per analysis cycle
  auto_apply_enabled: false            # Require manual approval by default
  max_auto_changes_per_day: 3          # Maximum auto-applied changes per day
  
  # Analysis lookback periods
  signal_analysis_lookback_hours: 24   # Signal analysis window
  system_analysis_lookback_hours: 48   # System health window
  market_analysis_lookback_hours: 168  # Market analysis window (1 week)
  
  # Claude API settings (can also be set via env vars)
  # model: "claude-sonnet-4-20250514"  # Default model
  # max_tokens: 8000                   # Max response tokens
  # timeout: 180                       # Request timeout (seconds)
