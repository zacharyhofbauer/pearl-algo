# PEARL Automated Trading Bots Configuration Example
#
# Add this to your config/config.yaml to enable PEARL bots in the strategies menu

pearl_bots:
  enabled: true  # Set to true to enable PEARL bots

  # Bot configurations - each bot is a complete automated strategy
  bots:

    # Trend Follower Bot - Similar to Lux Algo's Signals & Overlays (S&O)
    # Identifies strong trends and enters on pullbacks within trending markets
    trend_follower:
      enabled: true
      description: "Trend-following bot using moving averages and momentum"
      bot_class: "TrendFollowerBot"  # Must match registered bot class name

      # Trading parameters
      symbol: "MNQ"
      timeframe: "5m"
      max_positions: 1

      # Risk management (Prop Firm style)
      risk_per_trade: 0.01      # 1% of capital per trade
      stop_loss_pct: 0.005      # 0.5% stop loss
      take_profit_pct: 0.01     # 1% take profit
      min_confidence: 0.7       # Minimum signal confidence (0-1)

      # Alert and automation settings
      enable_alerts: true
      webhook_url: "https://your-webhook-endpoint.com/signal"  # Optional webhook for automation

      # Bot-specific parameters (trend following logic)
      parameters:
        min_trend_strength: 25.0      # Minimum ADX-like trend strength
        max_pullback_pct: 0.02        # Maximum pullback percentage in trend
        momentum_threshold: 0.005     # Minimum momentum for trend confirmation

    # Breakout Bot - Similar to Lux Algo's Price Action Concepts (PAC)
    # Identifies consolidation patterns and trades breakouts with volume confirmation
    breakout_trader:
      enabled: true
      description: "Breakout bot trading consolidation breakouts"
      bot_class: "BreakoutBot"

      # Trading parameters
      symbol: "MNQ"
      timeframe: "5m"
      max_positions: 1

      # Risk management
      risk_per_trade: 0.01
      stop_loss_pct: 0.008      # Wider stops for breakouts
      take_profit_pct: 0.015    # Higher targets for breakouts
      min_confidence: 0.75

      # Alert settings
      enable_alerts: true
      webhook_url: null  # Set your webhook URL for automated execution

      # Bot-specific parameters (breakout logic)
      parameters:
        min_pattern_strength: 0.6          # Minimum consolidation pattern strength
        require_volume_confirmation: true  # Require volume spike on breakout
        min_momentum_acceleration: 0.001   # Minimum momentum acceleration

    # Mean Reversion Bot - Similar to Lux Algo's Oscillator Matrix (OSC)
    # Identifies overbought/oversold conditions and trades reversions
    # NOTE: Higher risk strategy - enable only if you understand mean reversion
    mean_reverter:
      enabled: false  # Disabled by default - higher risk
      description: "Mean reversion bot using oscillator analysis"
      bot_class: "MeanReversionBot"

      # Trading parameters
      symbol: "MNQ"
      timeframe: "5m"
      max_positions: 1

      # Risk management (tighter for mean reversion)
      risk_per_trade: 0.008     # Lower risk per trade
      stop_loss_pct: 0.003      # Tighter stops
      take_profit_pct: 0.008    # Lower targets
      min_confidence: 0.8       # Higher confidence required

      # Alert settings
      enable_alerts: true
      webhook_url: null

      # Bot-specific parameters (mean reversion logic)
      parameters:
        min_mr_strength: 0.7      # Minimum mean reversion strength
        require_divergence: false # Require divergence for entry (optional)
        max_hold_bars: 10         # Maximum bars to hold position