# =============================================================================
# Risk Profiles Configuration
# =============================================================================
# Per-signal-type risk profiles based on historical performance analysis.
# These profiles control:
# - Stop loss multipliers (ATR-based)
# - Take profit targets (R:R ratios)
# - Favorable/unfavorable regimes and sessions
# - Position sizing behavior
#
# IMPORTANT: Profiles are updated based on actual performance data.
# Last updated: 2026-01-06 (based on performance.json analysis)
# =============================================================================

# =============================================================================
# SIGNAL TYPE RISK PROFILES
# =============================================================================
# Based on observed win rates from performance.json:
# - mean_reversion_long: 47% WR, +$1,983 (BEST PERFORMER)
# - mean_reversion_short: 33% WR, mixed results
# - sr_bounce_long: 40% WR, some winners
# - sr_bounce_short: 0% WR (0/8) = DISABLED
# - momentum_short: 50% WR (limited data)
# - momentum_long: 0% WR = DISABLED
# =============================================================================

signal_types:

  # ---------------------------------------------------------------------------
  # MEAN REVERSION LONG - PRIMARY SIGNAL (47% WR, +$1,983)
  # ---------------------------------------------------------------------------
  mean_reversion_long:
    enabled: true
    
    # Stop loss settings
    base_stop_multiplier: 1.3       # ATR multiplier (tighter for higher WR)
    min_stop_multiplier: 1.0
    max_stop_multiplier: 2.5
    
    # Take profit settings
    target_risk_reward: 1.5         # Target R:R
    min_risk_reward: 1.2            # Minimum acceptable R:R
    
    # Time management
    max_hold_minutes: 30
    
    # Regime preferences (trades best in these conditions)
    favorable_regimes:
      - ranging
      - trending_bullish
    unfavorable_regimes:
      - trending_bearish
    
    # Session preferences
    favorable_sessions:
      - new_york
      - london
    
    # Position sizing behavior
    size_scaling: aggressive        # Scale up on high confidence
    
    # Minimum thresholds
    min_confidence: 0.65
    
    # Historical performance (auto-updated)
    historical_win_rate: 0.47
    historical_avg_win: 400.0
    historical_avg_loss: 180.0

  # ---------------------------------------------------------------------------
  # MEAN REVERSION SHORT - SECONDARY SIGNAL (33% WR, use with caution)
  # ---------------------------------------------------------------------------
  mean_reversion_short:
    enabled: true
    
    # Stop loss settings (wider due to lower WR)
    base_stop_multiplier: 1.8
    min_stop_multiplier: 1.2
    max_stop_multiplier: 3.0
    
    # Take profit settings (higher R:R to compensate for lower WR)
    target_risk_reward: 2.0
    min_risk_reward: 1.8
    
    # Time management
    max_hold_minutes: 30
    
    # Regime preferences
    favorable_regimes:
      - ranging
      - trending_bearish
    unfavorable_regimes:
      - trending_bullish
    
    # Session preferences (NY only for better liquidity)
    favorable_sessions:
      - new_york
    
    # Position sizing behavior
    size_scaling: conservative      # Keep positions small
    
    # Minimum thresholds (stricter)
    min_confidence: 0.75
    
    # Historical performance
    historical_win_rate: 0.33
    historical_avg_win: 300.0
    historical_avg_loss: 200.0

  # ---------------------------------------------------------------------------
  # SR BOUNCE LONG - MODERATE SIGNAL (40% WR)
  # ---------------------------------------------------------------------------
  sr_bounce_long:
    enabled: true
    
    # Stop loss settings
    base_stop_multiplier: 1.5
    min_stop_multiplier: 1.0
    max_stop_multiplier: 2.5
    
    # Take profit settings
    target_risk_reward: 2.0
    min_risk_reward: 1.5
    
    # Time management
    max_hold_minutes: 20
    
    # Regime preferences
    favorable_regimes:
      - trending_bullish
      - ranging
    unfavorable_regimes:
      - trending_bearish
    
    # Session preferences
    favorable_sessions:
      - new_york
    
    # Position sizing behavior
    size_scaling: normal
    
    # Minimum thresholds (stricter)
    min_confidence: 0.75
    
    # Historical performance
    historical_win_rate: 0.40
    historical_avg_win: 350.0
    historical_avg_loss: 200.0

  # ---------------------------------------------------------------------------
  # SR BOUNCE SHORT - DISABLED (0% WR, -$2,314)
  # ---------------------------------------------------------------------------
  sr_bounce_short:
    enabled: false                  # DISABLED - 0% win rate (0/8 trades)
    
    # Settings preserved for potential future re-evaluation
    base_stop_multiplier: 2.0
    target_risk_reward: 2.5
    
