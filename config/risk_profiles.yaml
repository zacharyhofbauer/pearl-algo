# =============================================================================
# REGIME MULTIPLIERS
# =============================================================================
# Stop loss multipliers based on market regime.
# Values > 1.0 = wider stops, < 1.0 = tighter stops.

regime_multipliers:
  ranging: 1.0                # Base stops for ranging markets
  trending_bullish: 1.2       # Wider stops in trending markets
  trending_bearish: 1.2       # Wider stops in trending markets
  high_volatility: 1.4        # Even wider in high volatility
  unknown: 1.1                # Slightly wider when uncertain


# =============================================================================
# SESSION MULTIPLIERS
# =============================================================================
# Stop loss multipliers based on trading session.
# Lower values = tighter stops (less volatility expected).

session_multipliers:
  tokyo: 0.8                  # Tighter stops during Tokyo (low vol)
  asia: 0.8                   # Alias for Tokyo
  london: 0.9                 # Slightly tighter during London
  new_york: 1.0               # Full stops during NY (highest vol)
  overlap: 1.1                # Wider during session overlaps
  unknown: 0.9                # Conservative when unknown


# =============================================================================
# VOLATILITY MULTIPLIERS
# =============================================================================
# Stop loss multipliers based on volatility state.

volatility_multipliers:
  low: 0.9                    # Tighter stops in low volatility
  normal: 1.0                 # Base stops
  high: 1.3                   # Wider stops in high volatility
  extreme: 1.5                # Much wider in extreme volatility


# =============================================================================
# GLOBAL STOP LIMITS
# =============================================================================
# Hard limits on stop loss distance (in points).

stop_limits:
  max_stop_points: 25.0       # Maximum stop distance from entry
  min_stop_points: 5.0        # Minimum stop distance from entry


# =============================================================================
# MARKET DEPTH SETTINGS
# =============================================================================
# Settings for intelligent stop placement using market structure.

market_depth:
  enabled: true
  use_structure_stops: true   # Use swing highs/lows for stops
  use_round_numbers: true     # Avoid placing stops at round numbers
  round_number_interval: 25.0 # MNQ round number interval
  zone_width_atr_mult: 0.3    # S/R zone width as ATR multiplier
  lookback_periods: 50        # Bars to analyze for S/R
  swing_lookback: 5           # Bars for swing point detection


# =============================================================================
# SIGNAL TYPE PRIORITY
# =============================================================================
# Priority order for signal types (used for tie-breaking).
# Lower number = higher priority.

signal_priority:
  mean_reversion_long: 1      # Highest priority (best performer)
  momentum_short: 2
  sr_bounce_long: 3
  mean_reversion_short: 4
  vwap_reversion: 5
  breakout_long: 6
  breakout_short: 7
  # Disabled signals have no priority


